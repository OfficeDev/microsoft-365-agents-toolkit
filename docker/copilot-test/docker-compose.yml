# ATK Copilot Test – Docker Compose
#
# Quick start:
#   docker compose run --rm test
#
# Run a specific test:
#   TEST_FILE=teams-bot-create-template docker compose run --rm test
#
# Run with a VSIX file:
#   VSIX_PATH=./my-extension.vsix docker compose run --rm test

version: "3.8"

services:
  test:
    build:
      context: ../..           # repo root – needed for COPY packages/tests
      dockerfile: docker/copilot-test/Dockerfile
    image: atk-copilot-test:local
    environment:
      # Required: test file stem (without .test.ts)
      TEST_FILE: ${TEST_FILE:-teams-bot-create-template}
      # Optional: path to ATK .vsix inside the container
      VSIX_PATH: ${VSIX_PATH:-}
      # VSCode version to use (stable | insider | x.y.z)
      VSCODE_VERSION: ${VSCODE_VERSION:-stable}
      TEST_OUTPUT_DIR: /output
    volumes:
      # Host directory where screenshots / results.json / test.log land
      - ${HOST_OUTPUT_DIR:-./test-output}:/output
      # Optional: mount a pre-built VSIX from the host
      # - ./path/to/extension.vsix:/app/extension.vsix
    # Allow Xvfb to allocate a shared-memory segment (required for Electron/VSCode)
    shm_size: '512mb'
    # No network needed for the test itself
    network_mode: none