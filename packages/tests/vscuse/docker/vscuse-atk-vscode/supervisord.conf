[supervisord]
nodaemon=true
pidfile=/var/run/supervisord.pid
logfile=/var/log/supervisord.log
logfile_maxbytes=50MB
loglevel=info
user=root

[program:xvfb]
command=Xvfb :99 -screen 0 1024x768x24 -ac -nolisten tcp
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=10

[program:x11-setup]
command=/usr/local/bin/x11-setup.sh
environment=DISPLAY=:99
autorestart=false
startsecs=0
startretries=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=20

[program:azure-auth]
command=/usr/local/bin/azure-auth.sh
environment=DISPLAY=:99,HOME=/home/vscode,USER=vscode
autorestart=false
startsecs=0
startretries=1
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=25
user=vscode

[program:openbox]
command=openbox-session
environment=DISPLAY=:99
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
priority=30

[program:x11vnc]
command=x11vnc -display :99 -forever -shared -nopw -geometry 1024x768
autorestart=true
priority=40
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:novnc]
command=websockify --web /usr/local/novnc 6080 localhost:5900
autorestart=true
priority=50
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:vscode]
command=/usr/local/bin/vscode-setup.sh
environment=DISPLAY=:99,HOME=/home/vscode,DONT_PROMPT_WSL_INSTALL=1,BROWSER=/usr/local/bin/chrome-wrapper,CHROME_EXECUTABLE=/usr/local/bin/chrome-wrapper,EXTENSIONS_DIR=/tmp/extensions,XDG_CONFIG_HOME=/home/vscode/.config
user=vscode
autorestart=true
priority=60
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=5

[program:vscuse-docker-service]
command=python3 -m server.main
environment=DISPLAY=:99,SERVICE_PORT=6081,PYTHONPATH=/app
directory=/app
autorestart=true
priority=70
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
startsecs=5
