name: "TeamsFx javascript CodeQL config"

packs:
  - codeql/javascript-queries

queries:
  - name: Extended Security
    uses: security-extended

  - name: Security and Quality
    uses: security-and-quality

query-filters:
  # Suppress js/file-access-to-http: service clients intentionally upload
  # file data (app packages, ZIP deploys, Graph API updates). This is by-design.
  - exclude:
      id: js/file-access-to-http

paths-ignore:
  - "**/test/**/*"
  - "**/tests/**/*"
  - "**/*.test.ts"
  - "**/*.tests.ts"
  - ".github/scripts"
  - "templates/vsc/ts/graph-connector/src/graphClient.ts"
