# TEMP WORKAROUND: rerun.yml replaced with ATK Copilot test runner
# for manual trigger testing on feat/atk-copilot-issue-test-pipeline.
# Keep this version for future re-testing; revert to original dev content only before final merge.
name: rerun failed jobs

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'GitHub issue number to test against'
        required: true
        type: string
      author_login:
        description: 'Author login (optional)'
        required: false
        default: ''
        type: string

concurrency:
  group: atk-copilot-test-${{ inputs.issue_number }}
  cancel-in-progress: true

env:
  TEST_OUTPUT_DIR: /tmp/atk-test-output

jobs:
  run-atk-copilot-test:
    name: ATK Copilot Test (issue #${{ inputs.issue_number }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/atk-copilot-issue-test-pipeline

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system deps for headless VSCode + Playwright
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb libgtk-3-0 libxss1 libnss3 libxtst6 libxrandr2 libgbm1 libxkbcommon0 libdrm2 \
            libsecret-1-0 libglib2.0-0 libpulse0 unzip curl python3-pip \
            || true
          sudo apt-get install -y libasound2t64 2>/dev/null || sudo apt-get install -y libasound2 2>/dev/null || true
          pip3 install --quiet Pillow 2>/dev/null || true

      - name: Install Node deps
        working-directory: docker/copilot-test
        run: npm install --no-fund --no-audit

      - name: Install Playwright Chromium
        working-directory: docker/copilot-test
        run: npx playwright install chromium --with-deps 2>&1 || npx playwright install chromium 2>&1 || true

      - name: Install redhat.vscode-yaml from Open VSX
        run: |
          YAML_EXT_DIR="$HOME/vscode-extensions/redhat.vscode-yaml"
          mkdir -p "$YAML_EXT_DIR" /tmp/yaml-ext
          curl -sS -L -o /tmp/vscode-yaml.vsix \
            "https://open-vsx.org/api/redhat/vscode-yaml/1.23.0/file/redhat.vscode-yaml-1.23.0.vsix"
          if unzip -t /tmp/vscode-yaml.vsix >/dev/null 2>&1; then
            unzip -q /tmp/vscode-yaml.vsix -d /tmp/yaml-ext
            cp -r /tmp/yaml-ext/extension/. "$YAML_EXT_DIR/"
            echo "VSCODE_EXTENSIONS_DIR=$HOME/vscode-extensions" >> $GITHUB_ENV
            echo "yaml ext installed to $YAML_EXT_DIR"
          else
            echo "::warning::yaml vsix invalid, skipping"
          fi
          rm -rf /tmp/vscode-yaml.vsix /tmp/yaml-ext

      - name: Install ATK CLI
        run: npm install -g @microsoft/m365agentstoolkit-cli@1.1.10 --unsafe-perm true

      - name: Pre-download VSCode
        working-directory: docker/copilot-test
        run: |
          node -e "
            const { downloadAndUnzipVSCode } = require('@vscode/test-electron');
            downloadAndUnzipVSCode('stable')
              .then(p => console.log('VSCode ready:', p))
              .catch(e => console.warn('skipped:', e.message))
              .finally(() => process.exit(0));
          " || true

      - name: Start Xvfb
        run: |
          Xvfb :99 -ac -screen 0 1920x1080x24 &
          sleep 3
          echo "DISPLAY=:99.0" >> $GITHUB_ENV

      - name: Prepare output dir
        run: mkdir -p "$TEST_OUTPUT_DIR/screenshots" "$TEST_OUTPUT_DIR/projects"

      - name: Copy test sources into docker/copilot-test
        run: |
          mkdir -p docker/copilot-test/src/ui-test/copilot-driven
          cp -r packages/tests/src/ui-test/copilot-driven/. docker/copilot-test/src/ui-test/copilot-driven/
          cp -r test-plans docker/copilot-test/test-plans 2>/dev/null || true
          echo "Copied test sources:"
          ls docker/copilot-test/src/ui-test/copilot-driven/

      - name: Install ATK VSCode extension from GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VSIX_URL="https://github.com/OfficeDev/microsoft-365-agents-toolkit/releases/download/ms-teams-vscode-extension%406.8.0/ms-teams-vscode-extension-6.8.0.vsix"
          echo "Downloading ATK VSIX: $VSIX_URL"
          mkdir -p /tmp/atk-vsix /tmp/atk-ext-unzip
          curl -sS -L -H "Authorization: Bearer $GH_TOKEN" \
            -o /tmp/atk-vsix/atk.vsix "$VSIX_URL"
          if unzip -t /tmp/atk-vsix/atk.vsix >/dev/null 2>&1; then
            unzip -q /tmp/atk-vsix/atk.vsix -d /tmp/atk-ext-unzip
            ATK_INSTALL_DIR="$HOME/vscode-extensions/teamsdevapp.ms-teams-vscode-extension-6.8.0"
            mkdir -p "$ATK_INSTALL_DIR"
            cp -r /tmp/atk-ext-unzip/extension/. "$ATK_INSTALL_DIR/"
            echo "ATK_EXT_PATH=" >> $GITHUB_ENV
            echo "✅ ATK extension installed to $ATK_INSTALL_DIR"
            ls "$ATK_INSTALL_DIR" | head -5
          else
            echo "❌ VSIX download failed, falling back to source"
            echo "ATK_EXT_PATH=$GITHUB_WORKSPACE/packages/vscode-extension" >> $GITHUB_ENV
          fi
          rm -rf /tmp/atk-vsix /tmp/atk-ext-unzip

      - name: Run ATK UI tests
        working-directory: docker/copilot-test
        env:
          DISPLAY: ":99.0"
          TEST_FILE: teams-bot-create-template
          ATK_EXT_PATH: ${{ env.ATK_EXT_PATH || '' }}
          TEST_OUTPUT_DIR: /tmp/atk-test-output
          VSCODE_EXTENSIONS_DIR: ${{ env.VSCODE_EXTENSIONS_DIR || '' }}
        run: |
          npx ts-node --project tsconfig.json src/ui-test/copilot-driven/runTest.ts 2>&1 | tee $TEST_OUTPUT_DIR/test.log
          EXIT=${PIPESTATUS[0]}
          echo "Exit: $EXIT"
          exit $EXIT

      - name: Generate screenshots GIF
        if: always()
        id: gif
        run: |
          mapfile -t SHOTS < <(ls "$TEST_OUTPUT_DIR/screenshots/"*.png 2>/dev/null | sort)
          echo "Found ${#SHOTS[@]} screenshots"
          if [ ${#SHOTS[@]} -eq 0 ]; then
            echo "gif_path=" >> $GITHUB_OUTPUT
            exit 0
          fi
          GIF_PATH="$TEST_OUTPUT_DIR/test-run.gif"
          python3 << PYEOF
          import sys
          from PIL import Image
          import glob, os

          shots = sorted(glob.glob("$TEST_OUTPUT_DIR/screenshots/*.png"))
          gif_path = "$GIF_PATH"
          frames = []
          for p in shots:
              try:
                  img = Image.open(p).convert("RGBA")
                  if img.width > 1280:
                      ratio = 1280 / img.width
                      img = img.resize((1280, int(img.height * ratio)), Image.LANCZOS)
                  frames.append(img.convert("P", palette=Image.ADAPTIVE, dither=Image.Dither.NONE))
              except Exception as e:
                  print(f"Skip {p}: {e}")
          if frames:
              frames[0].save(gif_path, save_all=True, append_images=frames[1:],
                             loop=0, duration=2000, optimize=False)
              size = os.path.getsize(gif_path) // 1024
              print(f"GIF created: {gif_path} ({len(frames)} frames, {size}KB)")
          else:
              print("No frames could be loaded")
          PYEOF
          if [ -f "$GIF_PATH" ]; then
            echo "gif_path=$GIF_PATH" >> $GITHUB_OUTPUT
          else
            echo "gif_path=" >> $GITHUB_OUTPUT
          fi

      - name: Upload GIF to GitHub issue (get public URL)
        if: always() && steps.gif.outputs.gif_path != ''
        id: upload-gif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ inputs.issue_number }}
        run: |
          GIF_PATH="${{ steps.gif.outputs.gif_path }}"
          echo "Uploading GIF to issue #$ISSUE assets..."
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -F "file=@$GIF_PATH;type=image/gif" \
            "https://uploads.github.com/repos/${{ github.repository }}/issues/${ISSUE}/assets")
          echo "Response: $RESPONSE"
          GIF_URL=$(echo "$RESPONSE" | python3 -c "
          import sys, json
          try:
              d = json.load(sys.stdin)
              print(d.get('browser_download_url', ''))
          except:
              print('')
          " 2>/dev/null || echo "")
          echo "GIF public URL: $GIF_URL"
          echo "gif_url=$GIF_URL" >> $GITHUB_OUTPUT

      - name: Post results to issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ inputs.issue_number }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          GIF_URL: ${{ steps.upload-gif.outputs.gif_url || '' }}
        run: |
          RESULTS=$(cat $TEST_OUTPUT_DIR/results.json 2>/dev/null || echo '{"passed":0,"failed":0,"steps":[]}')
          PASSED=$(echo $RESULTS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('passed',0))")
          FAILED=$(echo $RESULTS | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('failed',0))")
          SHOTS=$(ls $TEST_OUTPUT_DIR/screenshots/*.png 2>/dev/null | wc -l || echo 0)
          LOG=$(tail -40 $TEST_OUTPUT_DIR/test.log 2>/dev/null || echo "no log")
          STATUS=$( [ "$FAILED" = "0" ] && echo "PASSED" || echo "FAILED" )
          STATUS_ICON=$( [ "$FAILED" = "0" ] && echo "OK" || echo "FAIL" )
          export STATUS STATUS_ICON PASSED FAILED SHOTS LOG TEST_PLAN STEPS_TABLE GIF_URL

          # Read test plan
          TEST_PLAN=$(cat test-plans/teams-bot-template/teams-bot-template.md 2>/dev/null | head -80 || cat test-plans/teams-bot-template.md 2>/dev/null | head -80 || echo "*(test plan not found)*")

          # Build step table from results.json
          STEPS_TABLE=$(echo $RESULTS | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          steps = d.get('steps', [])
          if not steps:
              print('*(no step details)*')
          else:
              print('| Step | Status |')
              print('|------|--------|')
              for s in steps:
                  icon = 'OK' if s.get('status') in ('pass', 'passed') else 'FAIL'
                  print(f'| {s.get(\"name\",\"?\")} | {icon} |')
          " 2>/dev/null || echo "*(step details unavailable)*")

          # Build GIF section
          GIF_SECTION=""
          if [ -n "$GIF_URL" ]; then
            GIF_SECTION="
          ### Screenshots

          ![test-run]($GIF_URL)
          "
          fi

          python3 - << PYEOF
          import subprocess, os, sys

          issue = os.environ['ISSUE']
          run_url = os.environ['RUN_URL']
          status = os.environ['STATUS']
          status_icon = os.environ['STATUS_ICON']
          passed = os.environ['PASSED']
          failed = os.environ['FAILED']
          shots = os.environ['SHOTS'].strip()
          log = os.environ['LOG']
          test_plan = os.environ['TEST_PLAN']
          steps_table = os.environ['STEPS_TABLE']
          gif_url = os.environ.get('GIF_URL', '')
          repo = '${{ github.repository }}'

          badge = '✅ PASSED' if status == 'PASSED' else '❌ FAILED'
          emoji = 'OK' if status == 'PASSED' else 'FAIL'

          gif_section = f'\n### Screenshots\n\n![test-run]({gif_url})\n' if gif_url else ''

          body = f"""<!-- atk-copilot-test-results -->
          ### 🤖 ATK Copilot Test Results — {badge}

          | | |
          |---|---|
          | **Issue** | #{issue} |
          | **Passed** | {passed} |
          | **Failed** | {failed} |
          | **Screenshots** | {shots} |
          | **Run** | [View logs]({run_url}) |
          {gif_section}
          ### Test Steps

          {steps_table}

          <details>
          <summary>Test Plan</summary>

          {test_plan}

          </details>

          <details>
          <summary>Test log (last 40 lines)</summary>

          \`\`\`
          {log}
          \`\`\`
          </details>"""

          result = subprocess.run(
              ['gh', 'issue', 'comment', issue, '--repo', repo, '--body', body],
              capture_output=True, text=True
          )
          print(result.stdout)
          if result.returncode != 0:
              print('Error:', result.stderr, file=sys.stderr)
              sys.exit(result.returncode)
          PYEOF

      - name: Remove atk-copilot-test label
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ inputs.issue_number }}
        run: |
          echo "Removing atk-copilot-test label from issue #$ISSUE"
          gh label create 'atk-copilot-test:done' \
            --repo ${{ github.repository }} \
            --color '0E8A16' \
            --description 'ATK Copilot test completed' 2>/dev/null || true
          gh issue edit "$ISSUE" \
            --repo ${{ github.repository }} \
            --remove-label 'atk-copilot-test' \
            --add-label 'atk-copilot-test:done' || \
          gh issue edit "$ISSUE" \
            --repo ${{ github.repository }} \
            --remove-label 'atk-copilot-test' || true
          echo "Label updated"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: atk-test-results-issue-${{ inputs.issue_number }}
          path: /tmp/atk-test-output/
          retention-days: 7
          if-no-files-found: warn

