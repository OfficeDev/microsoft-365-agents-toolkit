name: CD-Internal
run-name: CD-Internal-${{ github.run_id }}-${{ inputs.external_ref }}
on:
  workflow_dispatch:
    inputs:
      external_ref:
        type: string
        required: true
        description: "Branch/tag/SHA from OfficeDev/microsoft-365-agents-toolkit to checkout"

permissions:
  contents: read

jobs:
  cd:
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: OfficeDev/microsoft-365-agents-toolkit
          ref: ${{ github.event.inputs.external_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - name: Setup project
        run: npm run setup

      - name: Build and pack vsix
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
        run: |
          npm run build
          cd ./packages/vscode-extension
          pnpm dlx vsce package --no-dependencies
          for f in *.vsix; do mv "$f" "${f%.vsix}-internal.vsix"; done

      - name: Upload vsix
        uses: actions/upload-artifact@v4
        with:
          name: release
          path: packages/vscode-extension/*.vsix
