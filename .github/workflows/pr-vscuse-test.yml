name: PR VscUse Test Plan Selector

# Triggered when the 'atk-vsuse-test' label is added to a PR.
#
# This workflow:
#   1. Gets the diff between the PR branch and the target (default) branch
#   2. Calls GitHub Copilot (GPT-4.1) to select relevant VscUse test plans
#   3. Posts a PR comment listing the selected plans
#   4. Dispatches dev-smoke-test-pipeline.yml with those plans
#   5. Resolves (edits) the PR comment with the final pass/fail result

on:
  pull_request:
    types: [labeled]

# Cancel any in-progress run for the same PR if the label is re-applied
concurrency:
  group: pr-vscuse-test-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  pull-requests: write
  issues: write
  actions: write
  contents: read

jobs:
  select-plans-and-run:
    if: github.event.label.name == 'atk-vsuse-test'
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout plans dir + full git history for diff ─────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          sparse-checkout: |
            packages/tests/vscuse/vscode-test-cases/plans
            packages/tests/vscuse/smoking-test-cases.json

      # ── 2. Get changed files via API (PR file list) ────────────────────
      - name: Get PR changed files
        id: changed-files
        uses: actions/github-script@v6
        with:
          script: |
            // Fetch up to 100 changed files for the PR
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page: 100,
            });
            const fileList = files.map(f => `${f.status.padEnd(9)} ${f.filename}`).join('\n');
            core.setOutput('files', fileList);
            console.log(`Changed files (${files.length}):\n${fileList}`);

      # ── 3. Get git diff summary between PR branch and target branch ────
      - name: Get git diff summary
        id: diff-summary
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          git fetch origin "$BASE_REF" --depth=50 2>/dev/null || true
          # Collect changed file paths and a brief stat summary
          DIFF_STAT=$(git diff "origin/${BASE_REF}...${HEAD_SHA}" --stat --no-color 2>/dev/null \
            | tail -5 || echo "(diff unavailable)")
          echo "diff_stat<<EOF" >> "$GITHUB_OUTPUT"
          echo "$DIFF_STAT"     >> "$GITHUB_OUTPUT"
          echo "EOF"            >> "$GITHUB_OUTPUT"

      # ── 4. Select test plans via GitHub Copilot (GitHub Models API) ───
      - name: Select test plans via AI
        id: ai-select
        env:
          GH_TOKEN:                 ${{ secrets.GITHUB_TOKEN }}
          AZURE_OPENAI_ENDPOINT:    ${{ vars.TEST_TENANT_AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_KEY:         ${{ secrets.TEST_TENANT_AZURE_OPENAI_KEY }}
          AZURE_OPENAI_MODEL:       ${{ vars.TEST_TENANT_AZURE_OPENAI_MODEL }}
          AZURE_OPENAI_API_VERSION: ${{ vars.TEST_TENANT_AZURE_OPENAI_API_VERSION }}
          PR_TITLE:                 ${{ github.event.pull_request.title }}
          PR_BODY:                  ${{ github.event.pull_request.body }}
          CHANGED_FILES:            ${{ steps.changed-files.outputs.files }}
          DIFF_STAT:                ${{ steps.diff-summary.outputs.diff_stat }}
          BASE_BRANCH:              ${{ github.event.pull_request.base.ref }}
          HEAD_BRANCH:              ${{ github.head_ref }}
        run: |
          set -euo pipefail

          # List every available plan name (one per line)
          PLANS_TEXT=$(find packages/tests/vscuse/vscode-test-cases/plans \
            -maxdepth 1 -name "*.json" -exec basename {} .json \; | sort)

          SYSTEM_PROMPT='You are a test plan selector for the Microsoft 365 Agents Toolkit (ATK) VS Code extension.
Select the most relevant VscUse UI test plans for a given PR based on the changed files and PR description.

Test plan naming conventions:
- DA_*                        Declarative Agent (Copilot extensions, plugins, MCP, TypeSpec, OAuth, API Key, Entra)
- Basic_Custom_Engine_*       Custom Engine AI bot (LLM-based, Azure OpenAI, OpenAI)
- General_Teams_Agent_*       General Teams agent templates
- Teams_Agent_With_Data_*     Agent with AI Search / Custom API / knowledge data / RAG
- Teams_Collaborator_Agent_*  Multi-user collaboration agents
- Weather_Agent_*             Weather bot sample
- Simple_Bot_*                Simple / echo / notification bot
- Message_Extension_*         Message extension (search / action commands)
- Basic_Tab_* / Tab_*         Tab apps (React, SPFx)
- Sample_*                    Sample gallery (CoffeeAgent, Data Analyst, ProxyAgent, ...)
- Feature_*                   VS Code UI features (treeview, commands, publish, provision, deploy, AAD, manifest)
- Template_*                  Template / README verification

Suffixes: _Local_Debug=local F5 | _Remote_Debug=Azure deploy | _playground=Playground | _Copilot=Copilot chat
Languages: _js_=JavaScript | _ts_=TypeScript | _py_=Python

Selection guidance:
- Prefer Remote_Debug plans for template/scaffold changes (they give stronger signal)
- Include at least one Local_Debug plan for any core logic changes
- For UI/treeview/command changes, include Feature_UI_* or Feature_Command_* plans
- For DA/plugin/MCP changes, include 2-3 DA_* plans covering different auth types
- Keep total to 3-8 plans maximum

Return ONLY valid JSON: {"plans": ["PlanName1", "PlanName2"], "reason": "<one concise sentence>"}'

          USER_PROMPT="PR: ${HEAD_BRANCH} -> ${BASE_BRANCH}
Title: ${PR_TITLE}

Description (first 1200 chars):
${PR_BODY:0:1200}

Changed files (with status):
${CHANGED_FILES}

Diff summary:
${DIFF_STAT}

Available test plans:
${PLANS_TEXT}

Return JSON only."

          REQUEST_BODY=$(jq -n \
            --arg system "$SYSTEM_PROMPT" \
            --arg user   "$USER_PROMPT" \
            '{
              model: "openai/gpt-4.1",
              messages: [
                {role: "system", content: $system},
                {role: "user",   content: $user}
              ],
              temperature: 0.1,
              response_format: {type: "json_object"}
            }')

          # Try GitHub Models API first (no extra secrets needed)
          echo "Trying GitHub Models API..."
          HTTP_CODE=$(curl -s -o /tmp/ai_resp.json -w "%{http_code}" \
            -X POST "https://models.github.ai/inference/chat/completions" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY" || echo "000")
          echo "GitHub Models HTTP: $HTTP_CODE"

          # Fallback to Azure OpenAI
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Falling back to Azure OpenAI..."
            if [ -n "${AZURE_OPENAI_ENDPOINT:-}" ] && [ -n "${AZURE_OPENAI_KEY:-}" ]; then
              curl -s -o /tmp/ai_resp.json \
                -X POST "${AZURE_OPENAI_ENDPOINT}/openai/deployments/${AZURE_OPENAI_MODEL}/chat/completions?api-version=${AZURE_OPENAI_API_VERSION:-2025-04-01-preview}" \
                -H "api-key: $AZURE_OPENAI_KEY" \
                -H "Content-Type: application/json" \
                -d "$(echo "$REQUEST_BODY" | jq 'del(.model)')" || true
            fi
          fi

          # Parse AI response
          AI_CONTENT=$(jq -r '.choices[0].message.content // empty' /tmp/ai_resp.json 2>/dev/null || true)
          AI_PLANS=$(echo "$AI_CONTENT" | jq -r '.plans // empty' 2>/dev/null || true)
          AI_REASON=$(echo "$AI_CONTENT" | jq -r '.reason // empty' 2>/dev/null || true)

          # Validate: only keep plans that exist on disk
          VALID_PLANS='[]'
          if [ -n "$AI_PLANS" ] && [ "$AI_PLANS" != "null" ]; then
            while IFS= read -r plan; do
              [ -z "$plan" ] && continue
              if [ -f "packages/tests/vscuse/vscode-test-cases/plans/${plan}.json" ]; then
                VALID_PLANS=$(echo "$VALID_PLANS" | jq --arg p "$plan" '. + [$p]')
              else
                echo "Warning: AI returned unknown plan, skipping: $plan"
              fi
            done < <(echo "$AI_PLANS" | jq -r '.[]' 2>/dev/null || true)
          fi

          # Fallback to smoke tests if AI produced nothing usable
          if [ "$(echo "$VALID_PLANS" | jq 'length')" -eq 0 ]; then
            echo "No valid AI plans produced - falling back to smoke test cases."
            VALID_PLANS=$(jq -c '[.smokeTestCases[]]' packages/tests/vscuse/smoking-test-cases.json)
            AI_REASON="AI selection unavailable; using smoke test cases as fallback."
          fi

          PLANS_CSV=$(echo "$VALID_PLANS" | jq -r 'join(",")')
          echo "test_plans=${PLANS_CSV}" >> "$GITHUB_OUTPUT"
          echo "reason=${AI_REASON}"     >> "$GITHUB_OUTPUT"
          echo "Selected: $PLANS_CSV"
          echo "Reason:   $AI_REASON"

      # ── 5. Post initial PR comment ─────────────────────────────────────
      - name: Post PR comment with selected test plans
        id: post-comment
        uses: actions/github-script@v6
        env:
          TEST_PLANS: ${{ steps.ai-select.outputs.test_plans }}
          REASON:     ${{ steps.ai-select.outputs.reason }}
        with:
          script: |
            const plans    = process.env.TEST_PLANS.split(',').filter(Boolean);
            const reason   = process.env.REASON || '-';
            const runUrl   = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const planList = plans.map(p => `- \`${p}\``).join('\n');

            const body = [
              '## 🤖 VscUse Test Plan — AI Selected',
              '',
              `**Why these tests:** ${reason}`,
              '',
              `**Branch diff:** \`${{ github.head_ref }}\` → \`${{ github.event.pull_request.base.ref }}\``,
              '',
              '**Plans queued:**',
              planList,
              '',
              '---',
              '| Step | Status |',
              '|------|--------|',
              '| 1️⃣ Build VSIX (CD) | ⏳ Running… |',
              '| 2️⃣ Build Docker image | ⌛ Waiting |',
              '| 3️⃣ Run UI tests | ⌛ Waiting |',
              '',
              `> 🔗 [View pipeline run](${runUrl})`,
            ].join('\n');

            const { data: comment } = await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

            core.setOutput('comment_id', String(comment.id));
            console.log(`Posted comment: ${comment.html_url}`);

      # ── 6. Dispatch dev-smoke-test-pipeline with selected plans ────────
      - name: Dispatch dev-smoke-test-pipeline.yml
        id: dispatch
        uses: actions/github-script@v6
        env:
          TEST_PLANS: ${{ steps.ai-select.outputs.test_plans }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner      = context.repo.owner;
            const repo       = context.repo.repo;
            const testPlans  = process.env.TEST_PLANS;
            // Dispatch on the PR's head branch so CD builds that branch's code
            const headBranch = '${{ github.head_ref }}';

            await github.rest.actions.createWorkflowDispatch({
              owner,
              repo,
              workflow_id: 'dev-smoke-test-pipeline.yml',
              ref:         headBranch,
              inputs: {
                test_plan: testPlans,
                email:     '',
              },
            });

            await new Promise(r => setTimeout(r, 15000));

            const { data: { workflow_runs: runs } } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'dev-smoke-test-pipeline.yml',
              branch:      headBranch,
              per_page:    5,
            });

            const run = runs.find(r =>
              r.status !== 'completed' ||
              (Date.now() - new Date(r.created_at).getTime()) < 60000
            );

            if (!run) throw new Error('Could not locate the dispatched dev-smoke-test-pipeline run');

            core.setOutput('smoke_run_id',  String(run.id));
            core.setOutput('smoke_run_url', run.html_url);
            console.log(`Smoke pipeline run ID: ${run.id}  URL: ${run.html_url}`);

      # Update comment: pipeline now running
      - name: Update PR comment — pipeline dispatched
        uses: actions/github-script@v6
        env:
          COMMENT_ID: ${{ steps.post-comment.outputs.comment_id }}
          TEST_PLANS: ${{ steps.ai-select.outputs.test_plans }}
          REASON:     ${{ steps.ai-select.outputs.reason }}
          RUN_URL:    ${{ steps.dispatch.outputs.smoke_run_url }}
        with:
          script: |
            const commentId = parseInt(process.env.COMMENT_ID);
            const plans     = process.env.TEST_PLANS.split(',').filter(Boolean);
            const reason    = process.env.REASON || '-';
            const runUrl    = process.env.RUN_URL;
            const planList  = plans.map(p => `- \`${p}\``).join('\n');

            const body = [
              '## 🤖 VscUse Test Plan — AI Selected',
              '',
              `**Why these tests:** ${reason}`,
              '',
              `**Branch diff:** \`${{ github.head_ref }}\` → \`${{ github.event.pull_request.base.ref }}\``,
              '',
              '**Plans queued:**',
              planList,
              '',
              '---',
              '| Step | Status |',
              '|------|--------|',
              '| 1️⃣ Build VSIX (CD) | ⏳ Running… |',
              '| 2️⃣ Build Docker image | ⌛ Waiting |',
              '| 3️⃣ Run UI tests | ⌛ Waiting |',
              '',
              `> 🔗 [View smoke pipeline](${runUrl})`,
            ].join('\n');

            await github.rest.issues.updateComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: commentId,
              body,
            });

      # ── 7. Poll smoke pipeline until done ─────────────────────────────
      - name: Wait for smoke pipeline to complete
        id: wait-smoke
        uses: actions/github-script@v6
        env:
          SMOKE_RUN_ID: ${{ steps.dispatch.outputs.smoke_run_id }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner  = context.repo.owner;
            const repo   = context.repo.repo;
            const runId  = parseInt(process.env.SMOKE_RUN_ID);
            const start  = Date.now();
            // CD (2h) + Docker (2h) + UI tests (4h) = 8h max
            const EIGHT_HOURS = 8 * 60 * 60 * 1000;

            while (Date.now() - start < EIGHT_HOURS) {
              const { data: run } = await github.rest.actions.getWorkflowRun({ owner, repo, run_id: runId });
              console.log(`Smoke pipeline: ${run.status} / ${run.conclusion}`);
              if (run.status === 'completed') {
                core.setOutput('conclusion', run.conclusion);
                core.setOutput('run_url',    run.html_url);
                return;
              }
              await new Promise(r => setTimeout(r, 60000));
            }
            core.setOutput('conclusion', 'timed_out');
            throw new Error('Smoke pipeline timed out after 8 hours');

      # ── 8. Resolve PR comment with final result ────────────────────────
      - name: Resolve PR comment with test results
        if: always()
        uses: actions/github-script@v6
        env:
          COMMENT_ID:  ${{ steps.post-comment.outputs.comment_id }}
          TEST_PLANS:  ${{ steps.ai-select.outputs.test_plans }}
          REASON:      ${{ steps.ai-select.outputs.reason }}
          CONCLUSION:  ${{ steps.wait-smoke.outputs.conclusion }}
          SMOKE_URL:   ${{ steps.wait-smoke.outputs.run_url }}
        with:
          script: |
            const commentId  = parseInt(process.env.COMMENT_ID);
            if (!commentId) { console.log('No comment ID — skipping update'); return; }

            const plans      = (process.env.TEST_PLANS || '').split(',').filter(Boolean);
            const reason     = process.env.REASON || '-';
            const conclusion = process.env.CONCLUSION || 'unknown';
            const smokeUrl   = process.env.SMOKE_URL || '';
            const planList   = plans.map(p => `- \`${p}\``).join('\n');

            const succeeded  = conclusion === 'success';
            const icon       = succeeded ? '✅' : '❌';
            const statusText = succeeded ? 'All tests passed' : `Tests ${conclusion}`;

            const body = [
              `## ${icon} VscUse Test Plan — ${statusText}`,
              '',
              `**Why these tests:** ${reason}`,
              '',
              `**Branch diff:** \`${{ github.head_ref }}\` → \`${{ github.event.pull_request.base.ref }}\``,
              '',
              '**Plans run:**',
              planList,
              '',
              '---',
              '| Step | Status |',
              '|------|--------|',
              '| 1️⃣ Build VSIX (CD) | ✅ Done |',
              '| 2️⃣ Build Docker image | ✅ Done |',
              `| 3️⃣ Run UI tests | ${icon} ${statusText} |`,
              '',
              smokeUrl ? `> 🔗 [Full pipeline results](${smokeUrl})` : '',
              '',
              '<details>',
              '<summary>ℹ️ How were these tests selected?</summary>',
              '',
              'GitHub Copilot (GPT-4.1) analysed the PR title, description, and the diff between',
              `\`${{ github.head_ref }}\` and \`${{ github.event.pull_request.base.ref }}\``,
              'to pick the most relevant test plans from [`packages/tests/vscuse/Index.md`](../blob/${{ github.event.pull_request.base.ref }}/packages/tests/vscuse/Index.md).',
              '',
              '</details>',
            ].join('\n');

            await github.rest.issues.updateComment({
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              comment_id: commentId,
              body,
            });

            console.log(`Resolved comment ${commentId}: ${conclusion}`);
            if (!succeeded && conclusion !== 'timed_out') {
              core.setFailed(`VscUse tests concluded: ${conclusion}. See: ${smokeUrl}`);
            }
