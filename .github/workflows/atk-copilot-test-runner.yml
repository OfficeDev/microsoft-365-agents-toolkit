name: ATK Copilot Test Runner

# Triggered by atk-copilot-test-label.yml (via workflow_call) or manually.
#
# Architecture: @vscode/test-electron (activates ATK extension + Mocha) 
#               + Playwright CDP (takes real screenshots from outside extension host)
#
# Flow:
#  1. Read the GitHub issue to understand the test task.
#  2. Copilot CLI analyses the issue and packages/tests/copilot-test/test-plans/ to choose/create a test script.
#  3. The test runs headlessly (Xvfb + VSCode/test-electron + Playwright CDP).
#  4. Screenshots and a summary are posted back to the issue as a comment.
#  5. Label is swapped: atk-copilot-test -> atk-copilot-test:done.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number whose body describes the test task'
        required: true
        type: string
      author_login:
        description: 'GitHub login of the user who triggered the run'
        required: false
        default: ''
        type: string

  workflow_call:
    inputs:
      issue_number:
        description: 'Issue number whose body describes the test task'
        required: true
        type: string
      author_login:
        required: false
        default: ''
        type: string
    secrets:
      COPILOT_CLI_RUNNER_TOKEN:
        required: true

concurrency:
  group: atk-copilot-test-${{ inputs.issue_number || github.run_id }}
  cancel-in-progress: true

env:
  TEST_OUTPUT_DIR: /tmp/atk-test-output

jobs:
  run-atk-copilot-test:
    name: ATK Copilot Test (issue #${{ inputs.issue_number }})
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # ── VSIX acquisition: resolve or trigger early ────────────────────────
      # Runs right after checkout so CD pipeline starts ASAP while setup steps run.
      # Decision tree:
      #   1. Find most recent successful 'release' artifact on this branch.
      #   2. No VSIX-affecting diff since that artifact → reuse it.
      #   3. Diff detected OR no artifact → dispatch CD pipeline (alpha, skip markdown).
      # VSIX-affecting paths: packages/vscode-extension, packages/fx-core,
      #   packages/vscode-ui, packages/api
      - name: Resolve or trigger VSIX
        id: vsix-gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_BRANCH="${{ github.head_ref || github.ref_name }}"
          CURRENT_SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Branch: $HEAD_BRANCH  SHA: $CURRENT_SHA"

          # gh api does not support jq --arg; pipe to jq instead
          ARTIFACT_JSON=$(gh api \
            "repos/$REPO/actions/artifacts?name=release&per_page=50" \
            2>/dev/null \
            | jq --arg b "$HEAD_BRANCH" '
              [.artifacts[] | select(
                .expired == false
                and .workflow_run.head_branch == $b
                and .workflow_run.conclusion == "success"
              )] | sort_by(.created_at) | reverse | .[0]
            ') || ARTIFACT_JSON=""

          if [ -n "$ARTIFACT_JSON" ] && [ "$ARTIFACT_JSON" != "null" ]; then
            ARTIFACT_SHA=$(echo "$ARTIFACT_JSON" | jq -r '.workflow_run.head_sha')
            ARTIFACT_RUN_ID=$(echo "$ARTIFACT_JSON" | jq -r '.workflow_run.id')
            echo "Found artifact from run $ARTIFACT_RUN_ID at commit $ARTIFACT_SHA"

            # Guard: artifact SHA must be reachable in local git history
            CHANGED=0
            if [ "$ARTIFACT_SHA" = "$CURRENT_SHA" ]; then
              echo "Same commit — will reuse."
            elif ! git cat-file -e "${ARTIFACT_SHA}^{commit}" 2>/dev/null; then
              echo "Artifact SHA $ARTIFACT_SHA not reachable — treating as changed."
              CHANGED=1
            else
              VSIX_PATHS="packages/vscode-extension packages/fx-core packages/vscode-ui packages/api"
              CHANGED=$(git diff --name-only "$ARTIFACT_SHA" "$CURRENT_SHA" -- $VSIX_PATHS 2>/dev/null | wc -l | tr -d ' ')
              echo "Files changed in VSIX paths since $ARTIFACT_SHA: $CHANGED"
            fi

            if [ "$CHANGED" = "0" ]; then
              echo "No VSIX-affecting changes — reusing artifact from run $ARTIFACT_RUN_ID."
              echo "mode=reuse"          >> $GITHUB_OUTPUT
              echo "run_id=$ARTIFACT_RUN_ID" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "VSIX-affecting changes ($CHANGED files) — dispatching fresh CD build."
          else
            echo "No successful release artifact on branch '$HEAD_BRANCH' — dispatching CD."
          fi

          # Dispatch CD pipeline: alpha build, skip markdown check, feature-branch override
          DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatching cd.yml at $DISPATCH_TIME..."
          gh workflow run cd.yml \
            --repo "$REPO" \
            --ref "$HEAD_BRANCH" \
            -f preid=alpha \
            -f SkipBranchCheck=false \
            -f skipmarkdownandvulnerabilitycheck=true \
            -f pkgs=vscode

          sleep 15
          CD_RUN_ID=$(gh run list \
            --repo "$REPO" \
            --workflow cd.yml \
            --branch "$HEAD_BRANCH" \
            --event workflow_dispatch \
            --limit 10 \
            --json databaseId,createdAt \
            | jq --arg t "$DISPATCH_TIME" '
              [.[] | select(.createdAt >= $t)] | sort_by(.createdAt) | reverse | .[0].databaseId
            ')

          if [ -z "$CD_RUN_ID" ] || [ "$CD_RUN_ID" = "null" ]; then
            echo "::error::Could not find the dispatched CD run (checked runs after $DISPATCH_TIME)."
            exit 1
          fi
          echo "CD run dispatched: $CD_RUN_ID"
          echo "mode=cd"              >> $GITHUB_OUTPUT
          echo "cd_run_id=$CD_RUN_ID" >> $GITHUB_OUTPUT


      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install copilot-test dependencies
        working-directory: packages/tests/copilot-test
        run: npm install --legacy-peer-deps

      - name: Install system deps for headless VSCode + Playwright CDP
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            xvfb x11-utils \
            libgtk-3-0 libxss1 libnss3 libxtst6 libxrandr2 libgbm1 libxkbcommon0 libdrm2 \
            libsecret-1-0 libglib2.0-0 libpulse0 \
            || true
          # libasound varies by Ubuntu release
          sudo apt-get install -y libasound2t64 2>/dev/null || sudo apt-get install -y libasound2 2>/dev/null || true

      - name: Install Playwright Chromium (for CDP screenshots)
        working-directory: packages/tests/copilot-test
        run: |
          npx playwright install chromium --with-deps 2>&1 || \
          npx playwright install chromium 2>&1 || \
          echo "::warning::Playwright browser install had warnings"

      - name: Download redhat.vscode-yaml extension
        run: |
          # Download the real redhat.vscode-yaml VSIX from VS Code Marketplace.
          # runTest.ts installs it via runVSCodeCommand --install-extension at test start.
          curl -fsSL \
            "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/redhat/vsextensions/vscode-yaml/latest/vspackage" \
            -o /tmp/redhat-vscode-yaml.vsix
          echo "YAML_STUB_VSIX=/tmp/redhat-vscode-yaml.vsix" >> $GITHUB_ENV
          echo "Downloaded: $(du -sh /tmp/redhat-vscode-yaml.vsix | cut -f1)"

      - name: Wait for VSIX and download
        id: vsix-ready
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          MODE="${{ steps.vsix-gate.outputs.mode }}"
          echo "VSIX mode: $MODE"

          if [ "$MODE" = "reuse" ]; then
            RUN_ID="${{ steps.vsix-gate.outputs.run_id }}"
            echo "Downloading artifact from run $RUN_ID..."
            gh run download "$RUN_ID" --repo "$REPO" --name release --dir /tmp/vsix-download
          else
            CD_RUN_ID="${{ steps.vsix-gate.outputs.cd_run_id }}"
            echo "Waiting for CD run $CD_RUN_ID to complete (up to 60 min)..."
            DEADLINE=$((SECONDS + 3600))
            while [ $SECONDS -lt $DEADLINE ]; do
              STATUS=$(gh run view "$CD_RUN_ID" --repo "$REPO" --json status --jq '.status' 2>/dev/null || echo "unknown")
              echo "  $(date -u +%H:%M:%S) status=$STATUS"
              [ "$STATUS" = "completed" ] && break
              sleep 60
            done

            CONCLUSION=$(gh run view "$CD_RUN_ID" --repo "$REPO" --json conclusion --jq '.conclusion' 2>/dev/null || echo "unknown")
            if [ "$CONCLUSION" != "success" ]; then
              echo "::error::CD run $CD_RUN_ID finished with conclusion=$CONCLUSION"
              exit 1
            fi
            echo "CD complete — downloading artifact..."
            gh run download "$CD_RUN_ID" --repo "$REPO" --name release --dir /tmp/vsix-download
          fi

          VSIX_FILE=$(find /tmp/vsix-download -name "*.vsix" | head -1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::No .vsix found in downloaded artifact."
            exit 1
          fi
          echo "Extracting: $VSIX_FILE ($(du -sh "$VSIX_FILE" | cut -f1))"
          mkdir -p /tmp/atk-ext
          unzip -q -o "$VSIX_FILE" 'extension/*' -d /tmp/atk-ext
          EXT_DIR="/tmp/atk-ext/extension"
          VER=$(python3 -c "import json; d=json.load(open('$EXT_DIR/package.json')); print(d.get('version','?'))" 2>/dev/null || echo '?')
          echo "ATK_EXT_PATH=$EXT_DIR" >> $GITHUB_ENV
          echo "TEMPLATE_VERSION=local" >> $GITHUB_ENV
          echo "VSIX ready: ATK v$VER at $EXT_DIR"

      - name: Start Xvfb
        run: |
          Xvfb :99 -ac -screen 0 1920x1080x24 &
          sleep 3
          echo "DISPLAY=:99.0" >> $GITHUB_ENV

      - name: Prepare output directory
        run: mkdir -p "$TEST_OUTPUT_DIR/screenshots" "$TEST_OUTPUT_DIR/projects"

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot@1.0.9
          copilot --version

      - name: Set up Copilot credentials
        env:
          GH_USER:         ${{ vars.COPILOT_CLI_RUNNER_USER }}
          TEST_USER_TOKEN: ${{ secrets.COPILOT_CLI_RUNNER_TOKEN }}
          GH_APP_ID:       ${{ vars.COPILOT_CLI_RUNNER_APP_ID }}
        run: |
          mkdir -p ~/.config/github-copilot
          echo '{
            "'"github.com:${GH_APP_ID}"'":{
              "user": "'"$GH_USER"'",
              "oauth_token":"'"$TEST_USER_TOKEN"'",
              "githubAppId":"'"$GH_APP_ID"'"
            }
          }' > ~/.config/github-copilot/apps.json
          chmod 600 ~/.config/github-copilot/apps.json

      - name: Verify Copilot auth
        run: |
          if [ ! -s ~/.config/github-copilot/apps.json ]; then
            echo "::error::apps.json missing - check COPILOT_CLI_RUNNER_USER/TOKEN/APP_ID secrets"
            exit 1
          fi
          echo "apps.json present ($(wc -c < ~/.config/github-copilot/apps.json) bytes)"

      - name: Post in-progress comment on issue
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "$ISSUE" \
            --body "<!-- atk-copilot-test -->
          ### 🤖 ATK Copilot Test - started

          ⏳ Analysing issue and preparing test environment…

          [View workflow run]($RUN_URL)"

      - name: Run Copilot CLI test agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEST_OUTPUT_DIR: /tmp/atk-test-output
          DISPLAY: ":99.0"
          YAML_STUB_VSIX: ${{ env.YAML_STUB_VSIX }}
        run: |
          export COPILOT_GITHUB_TOKEN=$(python3 -c "import json,os; d=json.load(open(os.path.expanduser('~/.config/github-copilot/apps.json'))); print(list(d.values())[0]['oauth_token'])")

          SKILL_FILE="packages/tests/copilot-test/SKILL.md"
          cat > /tmp/copilot-prompt.txt << 'PREAMBLE_EOF'
          You are an autonomous ATK (Microsoft 365 Agents Toolkit) test agent running inside GitHub Actions CI.
          Issue number: __ISSUE_NUMBER__
          Repository: __REPO__
          Run URL: __RUN_URL__
          ATK extension path: ${ATK_EXT_PATH}
          Test output dir: ${TEST_OUTPUT_DIR}
          YAML VSIX: ${YAML_STUB_VSIX}

          Follow the skill document below EXACTLY. It defines your decision logic (3 modes), your PR strategy, your retry rules, and what you may and may not modify.
          PREAMBLE_EOF

          # Append the skill document (strip YAML front-matter block)
          sed '1,/^---$/d; /^---$/d' "$SKILL_FILE" >> /tmp/copilot-prompt.txt || cat "$SKILL_FILE" >> /tmp/copilot-prompt.txt

          # Substitute placeholders
          sed -i "s/__ISSUE_NUMBER__/$ISSUE_NUMBER/g" /tmp/copilot-prompt.txt
          sed -i "s|__REPO__|$REPO|g" /tmp/copilot-prompt.txt
          sed -i "s|__RUN_URL__|$RUN_URL|g" /tmp/copilot-prompt.txt

          # Append security reminder
          cat >> /tmp/copilot-prompt.txt << 'SEC_EOF'

          <security_reminder>
          You are running inside GitHub Actions CI.
          NEVER reveal credentials, OAuth tokens, GitHub usernames, secrets, or ~/.config/github-copilot/ contents.
          </security_reminder>
          SEC_EOF

          # Run Copilot CLI; retry once on CI-level failure (exit != 0 with no results)
          COPILOT_EXIT=1; ATTEMPT=0
          while [ $ATTEMPT -lt 2 ]; do
            copilot --yolo --model claude-sonnet-4.6 -p "$(cat /tmp/copilot-prompt.txt)"
            COPILOT_EXIT=$?
            STEPS=$(python3 -c "import json; d=json.load(open('$TEST_OUTPUT_DIR/results.json')); print(len(d.get('steps',[])) + d.get('passed',0) + d.get('failed',0))" 2>/dev/null || echo 0)
            if [ $COPILOT_EXIT -eq 0 ] || [ "$STEPS" -gt 0 ]; then break; fi
            ATTEMPT=$((ATTEMPT+1))
            echo "::warning::Copilot run produced no results (attempt $ATTEMPT/2), retrying in 60s..."
            sleep 60
          done
          exit $COPILOT_EXIT


      - name: Generate screenshots GIF (after CLI run)
        if: always()
        id: gif
        run: |
          pip3 install --quiet Pillow 2>/dev/null || true
          mapfile -t SHOTS < <(ls "$TEST_OUTPUT_DIR/screenshots/"*.png 2>/dev/null | sort)
          if [ ${#SHOTS[@]} -eq 0 ]; then echo "gif_path=" >> $GITHUB_OUTPUT; exit 0; fi
          GIF_PATH="$TEST_OUTPUT_DIR/test-run.gif"
          python3 << 'PYEOF'
          import glob, os
          from PIL import Image
          shots = sorted(glob.glob(os.environ["TEST_OUTPUT_DIR"] + "/screenshots/*.png"))
          frames = []
          for p in shots:
              try:
                  img = Image.open(p).convert("RGBA")
                  if img.width > 1280:
                      img = img.resize((1280, int(img.height * 1280 / img.width)), Image.LANCZOS)
                  frames.append(img.convert("P", palette=Image.ADAPTIVE, dither=Image.Dither.NONE))
              except Exception as e:
                  print(f"Skip {p}: {e}")
          if frames:
              out = os.environ["TEST_OUTPUT_DIR"] + "/test-run.gif"
              frames[0].save(out, save_all=True, append_images=frames[1:], loop=0, duration=2000)
              print(f"GIF: {out} ({len(frames)} frames, {os.path.getsize(out)//1024}KB)")
          PYEOF
          [ -f "$GIF_PATH" ] && echo "gif_path=$GIF_PATH" >> $GITHUB_OUTPUT || echo "gif_path=" >> $GITHUB_OUTPUT

      - name: Upload GIF via GitHub Release (public URL)
        if: always() && steps.gif.outputs.gif_path != ''
        id: upload-gif
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
          GIF_FILE: ${{ steps.gif.outputs.gif_path }}
          TEST_OUTPUT_DIR: ${{ env.TEST_OUTPUT_DIR }}
        run: |
          TAG="atk-test-screenshots-issue-${ISSUE}"
          echo "Uploading GIF via Release: $GIF_FILE (tag: $TAG)"
          # Delete existing release/tag from previous runs (clean slate)
          gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          # Create pre-release and upload GIF as asset
          if gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "ATK Test Screenshots - Issue #${ISSUE}" \
            --notes "Automated test screenshots. Issue: [#${ISSUE}](https://github.com/${{ github.repository }}/issues/${ISSUE})" \
            --prerelease \
            "$GIF_FILE#test-run.gif" 2>&1; then
            GIF_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/test-run.gif"
            echo "gif_url=$GIF_URL" >> $GITHUB_OUTPUT
            echo "GIF URL: $GIF_URL"
          else
            echo "::warning::Release create failed, no GIF will be embedded"
            echo "gif_url=" >> $GITHUB_OUTPUT
          fi

      - name: Remove label and add done label (failsafe - always runs)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          gh label create 'atk-copilot-test:done' \
            --repo ${{ github.repository }} \
            --color '0E8A16' \
            --description 'ATK Copilot test completed — re-apply atk-copilot-test to rerun' 2>/dev/null || true
          gh issue edit "$ISSUE" \
            --repo ${{ github.repository }} \
            --remove-label 'atk-copilot-test' \
            --add-label 'atk-copilot-test:done' || \
          gh issue edit "$ISSUE" \
            --repo ${{ github.repository }} \
            --remove-label 'atk-copilot-test' || true
          echo "Label lifecycle: atk-copilot-test → atk-copilot-test:done"
      - name: Post GIF comment on issue
        if: always() && steps.upload-gif.outputs.gif_url != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          GIF_URL="${{ steps.upload-gif.outputs.gif_url }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUN_ID="${{ github.run_id }}"
          # Search for this run's comment by run_id (most reliable), then fall back to marker
          COMMENT_ID=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE}/comments" \
            --jq --arg rid "$RUN_ID" '.[] | select(.body | contains($rid)) | .id' \
            | tail -1)
          if [ -z "$COMMENT_ID" ]; then
            COMMENT_ID=$(gh api "/repos/${{ github.repository }}/issues/${ISSUE}/comments" \
              --jq '.[] | select(.body | contains("atk-copilot-test-results")) | .id' \
              | tail -1)
          fi
          if [ -n "$COMMENT_ID" ]; then
            EXISTING=$(gh api "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" --jq .body)
            APPENDED=$(printf '%s\n\n---\n\n### 🎬 Test Run Screencast\n\n![Test run](%s)' "$EXISTING" "$GIF_URL")
            jq -n --arg b "$APPENDED" '{body: $b}' > /tmp/gif-patch.json
            gh api --method PATCH "/repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" --input /tmp/gif-patch.json
            echo "Updated comment ${COMMENT_ID} with GIF"
          else
            echo "No results comment found; posting standalone GIF comment"
            gh issue comment "$ISSUE" \
              --repo "${{ github.repository }}" \
              --body "$(printf '<!-- atk-copilot-test-gif -->\n### 🎬 Test Run Screencast\n\n![Test run](%s)\n\n[View full run](%s)' "$GIF_URL" "$RUN_URL")"
          fi

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: atk-test-results-issue-${{ inputs.issue_number }}-run-${{ github.run_number }}
          path: ${{ env.TEST_OUTPUT_DIR }}/
          retention-days: 14
          if-no-files-found: warn

      - name: Post failure comment on workflow error
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "$ISSUE" \
            --body "<!-- atk-copilot-test-results -->
          ### 🤖 ATK Copilot Test Results

          ❌ The test agent encountered an unexpected CI error.

          [View workflow run]($RUN_URL) for details."

