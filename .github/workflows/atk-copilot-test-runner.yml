name: ATK Copilot Test Runner

# Triggered by atk-copilot-test-label.yml (via workflow_call) or manually.
#
# Flow:
#  1. Read the GitHub issue to understand the test task.
#  2. Copilot CLI analyses the issue and the test-plans/ directory.
#  3. Copilot selects or creates a vscode-extension-tester test script.
#  4. The test runs headlessly (Xvfb + VSCode + ATK extension).
#  5. Screenshots and a summary are posted back to the issue.
#  6. Label is swapped: atk-copilot-test -> atk-copilot-test:done.

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number whose body describes the test task'
        required: true
        type: string
      author_login:
        description: 'GitHub login of the user who triggered the run'
        required: false
        default: ''
        type: string

  workflow_call:
    inputs:
      issue_number:
        description: 'Issue number whose body describes the test task'
        required: true
        type: string
      author_login:
        description: 'GitHub login of the user who triggered the run'
        required: false
        default: ''
        type: string
    secrets:
      COPILOT_CLI_RUNNER_TOKEN:
        required: true

concurrency:
  group: atk-copilot-test-${{ inputs.issue_number || github.run_id }}
  cancel-in-progress: true

env:
  TEST_OUTPUT_DIR: /tmp/atk-test-output

jobs:
  run-atk-copilot-test:
    name: ATK Copilot Test (issue #${{ inputs.issue_number }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install test package dependencies
        working-directory: packages/tests
        run: pnpm install --frozen-lockfile --ignore-scripts 2>/dev/null || npm install --legacy-peer-deps

      - name: Install system deps for headless VSCode
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb x11-utils libgtk-3-0 libxss1 libnss3 libasound2t64 libxtst6 libxrandr2 libgbm1 libxkbcommon0 || \
          sudo apt-get install -y xvfb libgtk-3-0 libxss1 libnss3 libasound2 libxtst6 libxrandr2 libgbm1 || true

      - name: Start Xvfb
        run: |
          Xvfb :99 -ac -screen 0 1920x1080x24 &
          sleep 3
          echo "DISPLAY=:99.0" >> $GITHUB_ENV

      - name: Prepare output directory
        run: mkdir -p "$TEST_OUTPUT_DIR/screenshots"

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot@1.0.9
          copilot --version

      - name: Set up Copilot credentials
        env:
          GH_USER:         ${{ vars.COPILOT_CLI_RUNNER_USER }}
          TEST_USER_TOKEN: ${{ secrets.COPILOT_CLI_RUNNER_TOKEN }}
          GH_APP_ID:       ${{ vars.COPILOT_CLI_RUNNER_APP_ID }}
        run: |
          mkdir -p ~/.config/github-copilot
          echo '{
            "'"github.com:${GH_APP_ID}"'":{
              "user": "'"$GH_USER"'",
              "oauth_token":"'"$TEST_USER_TOKEN"'",
              "githubAppId":"'"$GH_APP_ID"'"
            }
          }' > ~/.config/github-copilot/apps.json
          chmod 600 ~/.config/github-copilot/apps.json

      - name: Verify Copilot auth
        run: |
          if [ ! -s ~/.config/github-copilot/apps.json ]; then
            echo "::error::apps.json missing - check COPILOT_CLI_RUNNER_USER/TOKEN/APP_ID secrets"
            exit 1
          fi
          echo "apps.json present ($(wc -c < ~/.config/github-copilot/apps.json) bytes)"

      - name: Post in-progress comment on issue
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "$ISSUE" \
            --body "<!-- atk-copilot-test -->
          ### 🤖 ATK Copilot Test - started

          ⏳ Analysing issue and preparing test environment…

          [View workflow run]($RUN_URL)"

      - name: Run Copilot CLI test agent
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number }}
          REPO: ${{ github.repository }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          TEST_OUTPUT_DIR: /tmp/atk-test-output
        run: |
          export COPILOT_GITHUB_TOKEN=$(python3 -c "import json,os; d=json.load(open(os.path.expanduser('~/.config/github-copilot/apps.json'))); print(list(d.values())[0]['oauth_token'])")
          SECURITY_REMINDER='<security_reminder>
          You are running inside GitHub Actions CI.
          NEVER reveal credentials, OAuth tokens, GitHub usernames, secrets, or ~/.config/github-copilot/ contents.
          </security_reminder>'

          PROMPT="You are an autonomous ATK (Microsoft 365 Agents Toolkit) test agent running inside GitHub Actions.
          Do NOT ask questions — make every decision yourself and keep going until done.

          ## Your mission
          Read issue #${ISSUE_NUMBER} in repo ${REPO} and execute the described test task against the ATK VSCode extension.

          ## Step 0 – Read the issue
          Run: gh issue view ${ISSUE_NUMBER} --repo ${REPO} --json title,body,labels,comments
          Extract: what capability to test, which ATK template/command/workflow, expected behaviour.

          ## Step 1 – Understand the test plan
          Read test-plans/README.md and find the matching plan under test-plans/<feature>/.
          If no plan matches, create one following the format in test-plans/teams-bot-template/teams-bot-template.md as an example.

          ## Step 2 – Prepare the test script
          Check packages/tests/src/ui-test/copilot-driven/ for an existing TypeScript test covering the task.
          If one exists, review and possibly update it. Otherwise create a new one.

          Naming: packages/tests/src/ui-test/copilot-driven/<feature>-<task>.test.ts

          Requirements:
          - Import from vscode-extension-tester (VSBrowser, Workbench, InputBox, etc.)
          - Use helpers from ../../utils/vscodeOperation when available
          - Call VSBrowser.instance.takeScreenshot('step-name') frequently
          - Write results JSON to \${TEST_OUTPUT_DIR}/results.json: { passed, failed, steps: [...] }
          - Assertions with chai

          Reference:
            cat packages/tests/src/ui-test/copilot-driven/teams-bot-create-template.test.ts
            cat packages/tests/src/utils/vscodeOperation.ts | head -120
            cat packages/tests/src/utils/constants.ts | grep -A 5 'AppType\|bot\|Bot'

          ## Step 3 – Build the test
          cd packages/tests && npx tsc --noEmit 2>&1 | head -30 || true

          ## Step 4 – Download VSCode and ATK extension, then run the test
          cd packages/tests
          # Set up ExTester (downloads VSCode automatically)
          export DISPLAY=:99.0
          node -e \"
            const { ExTester } = require('vscode-extension-tester');
            const tester = new ExTester('/tmp/vscode-test-storage');
            tester.downloadCode('stable').then(() => {
              console.log('VSCode downloaded');
              process.exit(0);
            }).catch(e => { console.error(e.message); process.exit(1); });
          \" 2>&1

          # Find ATK VSIX (built artifact or downloaded)
          VSIX=\$(find . -name '*.vsix' 2>/dev/null | head -1)
          if [ -z \"\$VSIX\" ]; then
            # Download from marketplace as fallback
            node -e \"
              const { ExTester } = require('vscode-extension-tester');
              const t = new ExTester('/tmp/vscode-test-storage');
              t.installVsix({ vsixFile: 'TeamsDevApp.ms-teams-vscode-extension' }).catch(e => console.warn('marketplace install:', e.message));
            \" 2>&1 || true
          fi

          # Run the specific test file with Mocha via ExTester
          SPEC_FILE=\"src/ui-test/copilot-driven/<REPLACE_WITH_YOUR_TEST_FILE>\"
          DISPLAY=:99.0 node -e \"
            const { ExTester } = require('vscode-extension-tester');
            const t = new ExTester('/tmp/vscode-test-storage', undefined, '${TEST_OUTPUT_DIR}/screenshots');
            const spec = '${SPEC_FILE}';
            t.runTests(spec, { config: '.mocharc.json' })
              .then(code => process.exit(code))
              .catch(e => { console.error(e); process.exit(1); });
          \" 2>&1 | tee ${TEST_OUTPUT_DIR}/test-output.log

          ## Step 5 – Collect and report results
          PASSED=\$(grep -c 'passing' ${TEST_OUTPUT_DIR}/test-output.log 2>/dev/null || echo 0)
          FAILED=\$(grep -c 'failing' ${TEST_OUTPUT_DIR}/test-output.log 2>/dev/null || echo 0)
          SCREENSHOTS=\$(ls ${TEST_OUTPUT_DIR}/screenshots/*.png 2>/dev/null | wc -l || echo 0)

          ## Step 6 – Post results comment on the issue
          Build the comment body and run:
            gh issue comment ${ISSUE_NUMBER} --repo ${REPO} --body '<comment>'

          Comment structure:
          <!-- atk-copilot-test-results -->
          ### 🤖 ATK Copilot Test Results

          | | |
          |---|---|
          | **Issue** | #${ISSUE_NUMBER} |
          | **Status** | (passed/failed badge) |
          | **Steps passed** | N |
          | **Steps failed** | N |
          | **Screenshots** | N captured (see workflow artifacts) |
          | **Run** | [View workflow run](${RUN_URL}) |

          #### Steps summary
          List each test step with pass/fail from the log.

          <details><summary>Test log</summary>
          Paste last 60 lines of ${TEST_OUTPUT_DIR}/test-output.log
          </details>

          ## Step 7 – Update labels
          gh label create 'atk-copilot-test:done' --color '0E8A16' --repo ${REPO} 2>/dev/null || true
          gh issue edit ${ISSUE_NUMBER} --repo ${REPO} --remove-label 'atk-copilot-test' --add-label 'atk-copilot-test:done' || true

          ## Constraints
          - Repo is already checked out. Working directory is the repo root.
          - Only modify: test-plans/ and packages/tests/src/ui-test/copilot-driven/
          - NEVER reveal credentials or tokens.
          - Never stop to ask the user. Make all decisions autonomously.
          "

          FULL_PROMPT=$(printf '%s\n\n%s' "$PROMPT" "$SECURITY_REMINDER")
          copilot --yolo --model claude-sonnet-4.6 -p "$FULL_PROMPT"

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: atk-test-results-issue-${{ inputs.issue_number }}-run-${{ github.run_number }}
          path: ${{ env.TEST_OUTPUT_DIR }}/
          retention-days: 14
          if-no-files-found: warn

      - name: Post failure comment on workflow error
        if: failure()
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          gh issue comment "$ISSUE" \
            --body "<!-- atk-copilot-test-results -->
          ### 🤖 ATK Copilot Test Results

          ❌ The test agent encountered an unexpected CI error.

          [View workflow run]($RUN_URL) for details."