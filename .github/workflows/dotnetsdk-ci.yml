name: DotNet SDK CI

# Microsoft.TeamsFx (.NET) SDK is deprecated (community-supported until Sept 2026).
# Automatic triggers are disabled; run manually via workflow_dispatch only.
on:
  workflow_dispatch:
  # push:
  #   paths:
  #     - "packages/dotnet-sdk/**"
  #   branches: [dev, release/**]
  # pull_request:
  #   paths:
  #     - "packages/dotnet-sdk/**"
  #   branches: [dev, release/**]

defaults:
  run:
    working-directory: packages/dotnet-sdk/

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Setup .NET
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: 8.x
      - name: Build
        run: dotnet build -c Release Microsoft.TeamsFx.sln
      - name: Test
        run: dotnet test Microsoft.TeamsFx.sln
