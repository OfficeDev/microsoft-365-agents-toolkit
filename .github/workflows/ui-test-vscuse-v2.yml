name: uitest-vscuse-v2

on:
  workflow_dispatch:
    inputs:
      test_plan:
        description: "Comma-separated list of test cases to run, input test case id (e.g. 33258708, 33258728)"
        required: false
      pre_release_testing:
        description: "Run pre-release testing (overrides test_plan)"
        required: false
        type: boolean
        default: false
      image_tag:
        description: "Docker image tag to use"
        required: true
        default: "latest"
      email-receiver:
        description: "email notification receiver"
        required: false
        type: string

  schedule:
    - cron: "30 12 * * *"   # UTC+8 20:30 daily
permissions:
  actions: read
jobs:
  discover-test-plans:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      test-plans: ${{ steps.get-plans.outputs.plans }}
      email-receiver: ${{ steps.get-plans.outputs.email-receiver }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set the email receiver
        id: bvt
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          echo "email-receiver=teamsfxqa@microsoft.com" >> $GITHUB_OUTPUT

      - name: Get test plans
        id: get-plans
        run: |
          if [ "${{ github.event.inputs.pre_release_testing }}" == "true" ]; then
            if [ -f "packages/tests/vscuse/vscode-test-cases/pre-release-test-cases.json" ]; then
              plans=$(cat packages/tests/vscuse/vscode-test-cases/pre-release-test-cases.json | jq -c '.')
              echo "plans=$plans" >> $GITHUB_OUTPUT
              echo "Using pre-release test plans: $plans"
            else
              echo "Error: pre-release-test-cases.json not found"
              exit 1
            fi
          elif [ -z "${{ github.event.inputs.test_plan }}" ]; then
            # Get only top-level JSON files from plans directory (strip the .json extension)
            plans=$(find packages/tests/vscuse/vscode-test-cases/plans/ -maxdepth 1 -type f -name "*.json" -exec basename {} .json \; | jq -R -s -c 'split("\n")[:-1]')
            echo "plans=$plans" >> $GITHUB_OUTPUT
            echo "Found test plans: $plans"
          else
            # Use the input test_plan file name(s)
            # Support comma-separated list, trim spaces
            input_plans=$(echo "${{ github.event.inputs.test_plan }}" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R -s -c 'split("\n")[:-1]')
            echo "plans=$input_plans" >> $GITHUB_OUTPUT
            echo "Using input test plans: $input_plans"
          fi

  main:
    name: Case-${{ matrix.test_plan }}
    needs: discover-test-plans
    runs-on: ubuntu-latest
    timeout-minutes: 50

    strategy:
      matrix:
        test_plan: ${{ fromJson(needs.discover-test-plans.outputs.test-plans) }}
      fail-fast: false
      max-parallel: 10
    permissions:
      contents: read
      packages: write
      id-token: write
      security-events: write
    environment: engineering

    env:
      GH_APP_ID: ${{ secrets.GH_APP_ID }}
      GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
      AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT_NEW }}
      AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_KEY_NEW }}
      AZURE_OPENAI_MODEL: "gpt-4.1"
      AZURE_SEARCH_ENDPOINT: ${{ secrets.AZURE_SEARCH_ENDPOINT_NEW }}
      AZURE_SEARCH_KEY: ${{ secrets.AZURE_SEARCH_KEY_NEW }}
      # Azure Service Principal for M365 Toolkit authentication
      #AZURE_CLIENT_ID: ${{ secrets.AZURE_SERVICE_PRINCIPAL_ID }}
      #AZURE_CLIENT_SECRET: ${{ secrets.AZURE_SERVICE_PRINCIPAL_SECRET }}
      AZURE_TENANT_ID: ${{ secrets.TEST_TENANT_ID_NEW  }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.TEST_SUBSCRIPTION_ID_NEW }}
      AZURE_AUTH_ENABLED: ${{ secrets.AZURE_SERVICE_PRINCIPAL_ID != '' && secrets.AZURE_SERVICE_PRINCIPAL_SECRET != '' && secrets.TEST_TENANT_ID_NEW != '' }}
      # M365 account for testing
      M365_USERNAME_1: "test21@xxbdw.onmicrosoft.com"
      M365_USERNAME_2: "test22@xxbdw.onmicrosoft.com"
      M365_USERNAME_3: "test23@xxbdw.onmicrosoft.com"
      M365_USERNAME_4: "test24@xxbdw.onmicrosoft.com"
      M365_ACCOUNT_PASSWORD: ${{ secrets.TEST_M365_PASSWORD }}

      # The test account for Copilot features
      M365_ACCOUNT_NAME_EnableCopilotAccess: "test01@atktesting.onmicrosoft.com"
      M365_ACCOUNT_PASSWORD_EnableCopilotAccess: ${{ secrets.TEST_M365_PASSWORD_NEW }}
      
      AZURE_ACCOUNT_NAME: ${{ secrets.TEST_USER_NAME_NEW }}
      AZURE_ACCOUNT_PASSWORD: ${{ secrets.TEST_USER_PASSWORD_NEW }}
      M365_TENANT_ID: ${{ secrets.TEST_CLEAN_TENANT_ID }}
      # GITHUB test account
      GITHUB_ACCOUNT_NAME: ${{ secrets.GH_ACCOUNT_NAME }}
      GITHUB_ACCOUNT_PASSWORD: ${{ secrets.GH_ACCOUNT_PASSWORD }}
      GITHUB_MFA_SECRET: ${{ secrets.GH_MFA_SECRET }}
      #Additional value:
      DA_MCP_ENTRA_SSO_CLIENTID: ${{ secrets.DA_MCP_ENTRA_SSO_CLIENTID }}
      DA_MCP_OAUTH_CLIENT_SECERT: ${{ secrets.DA_MCP_OAUTH_CLIENT_SECERT }}
      DA_MCP_OAUTH_CLIENTID: ${{ secrets.DA_MCP_OAUTH_CLIENTID }}

      # SQL server
      SQL_USER: ${{ secrets.SQL_USER }}
      SECRET_SQL_PASSWORD: ${{ secrets.SECRET_SQL_PASSWORD }}
      SQL_SERVER: "vscuse-test-sql.database.windows.net"
      SQL_DATABASE: "vscuse-test-db"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install dependencies for download actions
        run: npm install @octokit/auth-app @octokit/request @octokit/core node-fetch 
        shell: bash


      - name: Run download script
        run: node download-vscuse-python.js "latest" "${{ github.workspace }}/packages/tests/vscuse/vscode-test-cases"
        shell: bash
        working-directory: .github/actions/setup-vscuse-environment

      - name: Set up Python virtual environment and install wheel
        run: |
          cd packages/tests/vscuse/vscode-test-cases
          python -m venv .venv
          source .venv/bin/activate
          WHEEL_FILE=$(ls *.whl | head -n 1)
          pip install "./$WHEEL_FILE"
        shell: bash

      - name: Verify Azure Configuration
        run: |
          echo "Verifying Azure configuration..."

          # Check Azure OpenAI (required)
          if [ -z "$AZURE_OPENAI_ENDPOINT" ] || [ -z "$AZURE_OPENAI_API_KEY" ]; then
            echo "❌ Azure OpenAI configuration missing"
            exit 1
          else
            echo "✅ Azure OpenAI configured"
          fi

          # Check Azure Service Principal (optional)
          if [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_CLIENT_SECRET" ] && [ -n "$AZURE_TENANT_ID" ]; then
            echo "✅ Azure Service Principal configured - M365 Toolkit authentication enabled"
          else
            echo "⚠️  Azure Service Principal not configured - M365 Toolkit authentication disabled"
          fi

      - name: Set m365 account randomly
        run: |
          users=("${{ env.M365_USERNAME_1 }}" "${{ env.M365_USERNAME_2 }}" "${{ env.M365_USERNAME_3 }}" "${{ env.M365_USERNAME_4 }}")
          count=${#users[@]}
          index=$((RANDOM%$count))
          echo "account index: $index"
          echo "M365_ACCOUNT_NAME=${users[index]}" >> $GITHUB_ENV

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull pre-built Docker image
        run: |
          IMAGE_TAG="${{ github.event.inputs.image_tag }}"
          if [ -z "$IMAGE_TAG" ]; then
            IMAGE_TAG="latest"
          fi
          VSCUSE_VSCODE_IMAGE="ghcr.io/microsoft/vscuse-vscode:$IMAGE_TAG"
          echo "VSCUSE_VSCODE_IMAGE=$VSCUSE_VSCODE_IMAGE" >> $GITHUB_ENV
          echo "Pulling pre-built Docker image: $VSCUSE_VSCODE_IMAGE"
          docker pull $VSCUSE_VSCODE_IMAGE
          echo "✅ Image pulled successfully!"
          echo "Image details:"
          docker images $VSCUSE_VSCODE_IMAGE
          
      - name: Run test
        run: |
          echo "🚀 Running test plan: ${{ matrix.test_plan }}"
          echo "Using image tag: ${{ github.event.inputs.image_tag || 'latest' }}"
          echo "Test execution started at: $(date)"

          cd packages/tests/vscuse/vscode-test-cases
          python -m venv .venv
          source .venv/bin/activate
          vscuse execute --config-file ./config.yaml --groups-dir groups ./plans/${{ matrix.test_plan }}.json

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-debug-artifacts-${{ matrix.test_plan }}-${{ github.run_number }}
          path: |
            packages/tests/vscuse/vscode-test-cases/test_report/
          retention-days: 7
          if-no-files-found: ignore


      - name: Rename test_report.html to index.html
        if: always()
        run: |
          REPORT_DIR="packages/tests/vscuse/vscode-test-cases/test_report"
          if [ -f "$REPORT_DIR/test_report.html" ]; then
            mv "$REPORT_DIR/test_report.html" "$REPORT_DIR/index.html"
            echo "Renamed test_report.html to index.html"
          else
            echo "No test_report.html found to rename"
          fi
      # Upload files to Azure Blob Storage
      - name : Login to Azure
        if: always()
        uses: azure/login@v2
        with:
          client-id: ${{secrets.DEVOPS_CLIENT_ID}}
          tenant-id: ${{secrets.DEVOPS_TENANT_ID}}
          subscription-id: ${{secrets.DEVOPS_SUB_ID}}
          enable-AzPSSession: true

      - name: 🌐Upload files to Azure Blob Storage
        if: always()
        shell: pwsh
        run: |
          $guid = [guid]::NewGuid().ToString()
          $account = $env:AZURE_STORAGE_ACCOUNT
          $sourcePath = "packages/tests/vscuse/vscode-test-cases/test_report/"
          $destination = "`$web/$guid"
          $storageUrl = "https://vscusedownload.z13.web.core.windows.net/$guid/index.html"
      
          Write-Host "🌐Here is the report: $storageUrl"

          echo "$storageUrl" > storage_url.txt
      
          az storage blob upload-batch `
            --account-name $account `
            --auth-mode login `
            --destination $destination `
            --source "$sourcePath" `
            --overwrite
        env:
          AZURE_STORAGE_ACCOUNT: vscusedownload

      - name: Cleanup
        if: always()
        run: |
          echo "🧹 Cleaning up resources..."

          # Stop and remove any containers using our image
          echo "Cleaning up VSCode containers..."
          docker stop $(docker ps -q --filter "ancestor=ghcr.io/microsoft/vscuse-vscode:${{ github.event.inputs.image_tag || 'latest' }}") 2>/dev/null || echo "No containers to stop"
          docker rm $(docker ps -aq --filter "ancestor=ghcr.io/microsoft/vscuse-vscode:${{ github.event.inputs.image_tag || 'latest' }}") 2>/dev/null || echo "No containers to remove"

  rerun:
    permissions:
      actions: write
    needs: main
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && failure() && github.run_attempt < 5 }}
    runs-on: ubuntu-latest
    steps:
      - name: trigger rerun workflow
        run: |
          curl \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}"\
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/rerun.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}","inputs":{"run_id":"${{ github.run_id }}", "max_attempts":"5"}}'




  report:
    if: ${{ (github.event_name == 'workflow_dispatch' && needs.setup.outputs.email-receiver) || (github.event_name == 'schedule' && (success() || (failure() && github.run_attempt >= 5))) }}
    needs: [discover-test-plans, main]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/tests
    steps:
      - name: Checkout
        uses: actions/checkout@v3


      - name: Ensure vscuse-related folder exists
        shell: pwsh
        run: |
          $casesFolderPath = "packages/tests/vscuse/agent_cases"
          if (-not (Test-Path -Path $casesFolderPath)) {
            New-Item -ItemType Directory -Path $casesFolderPath | Out-Null
            Write-Host "Created folder: $casesFolderPath"
          } else {
            Write-Host "Folder already exists: $casesFolderPath"
          }
      # Download test case files artifact and unzip to agent_cases
      - name: Download vscuse-agent-cases artifact
        uses: actions/download-artifact@v4
        with:
          name: vscuse-agent-cases
          path: packages/tests/vscuse/agent_cases

      - name: Unzip test case files if zipped
        shell: pwsh
        run: |
          $zipFiles = Get-ChildItem -Path "packages/tests/vscuse/agent_cases" -Filter *.zip
          if ($zipFiles.Count -eq 0) {
            Write-Host "No zip files found in agent_cases directory."
          }
          foreach ($zip in $zipFiles) {
            Write-Host "Unzipping $($zip.FullName)..."
            Expand-Archive -Path $zip.FullName -DestinationPath "packages/tests/vscuse/agent_cases" -Force
            Remove-Item $zip.FullName
          }
          Get-ChildItem -Path "packages/tests/vscuse/agent_cases" -Recurse | ForEach-Object { Write-Host $_.FullName }
      - name: Download storage URLs
        uses: actions/download-artifact@v4
        with:
          pattern: storage-url-*
          path: /tmp/storage-urls

      - name: Process storage URLs
        shell: bash
        run: |
          if [ -d "/tmp/storage-urls" ]; then
            echo "Found storage URLs folder. Processing contents..."
            
            # Find and extract all zip files to /tmp/storage-urls directory
            find /tmp/storage-urls -name "*.zip" -exec unzip -o {} -d /tmp/storage-urls \;
            
            # Create a JSON object from all storage_url.txt files
            echo "{" > /tmp/url_mapping.json
            first_entry=true
            
            # Find all storage_url.txt files and process them
            find /tmp/storage-urls -type f -name "storage_url.txt" | while read file; do
              # Extract the job ID from the parent directory name (storage-url-CASENAME_RUNID)
              dir_name=$(basename $(dirname "$file"))
              case_run_id=$(echo "$dir_name" | rev | cut -d'-' -f1 | rev)
              
              # Read the content of the file
              content=$(cat "$file" | tr -d '\n' | tr -d '\r')
              
              # Add comma for all entries except the first one
              if [ "$first_entry" = true ]; then
                first_entry=false
              else
                echo "," >> /tmp/url_mapping.json
              fi
              
              # Add the entry to JSON (properly escaped)
              echo "  \"$case_run_id\": \"$content\"" >> /tmp/url_mapping.json
            done
            
            echo "}" >> /tmp/url_mapping.json
            
            echo "Generated JSON mapping:"
            cat /tmp/url_mapping.json
            
            # Count total files processed
            total_urls=$(find /tmp/storage-urls -type f -name "/tmp/storage_url.txt" | wc -l)
            echo "Total storage URL files processed: $total_urls"
          else
            echo "No storage URL artifacts found"
            echo "{}" > /tmp/url_mapping.json
          fi
      - name: Install Dateutils
        run: |
          sudo apt install dateutils
      - name: list jobs
        id: list-jobs
        working-directory: packages/tests/vscuse
        run: |
          page=1
          jobs="[]"
          echo "Initial jobs: $jobs"
          
          report_map_json_file_path="/tmp/url_mapping.json"
          while :
          do
            url="https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/attempts/${{ github.run_attempt }}/jobs?per_page=100&page=$page"
            echo "Fetching URL: $url"
      
            resp=$(curl -s -H "Accept: application/vnd.github.v3+json" -u:${{ secrets.GITHUB_TOKEN }} "$url")
            echo "Response from GitHub API: $resp"

            new_jobs=$(echo "$resp" | jq -cr '.jobs')
            echo "New jobs extracted: $new_jobs"

            jobs=$(jq -cr --slurp 'add' <(echo "$jobs") <(echo "$new_jobs"))
            echo "Updated jobs list: $jobs"

            has_next=$(curl -I -H "Accept: application/vnd.github.v3+json" -u:${{ secrets.GITHUB_TOKEN }} "$url" | grep -Fi "link:" | grep "rel=\"last\"" || true)
            echo "Has next page: $has_next"

            if [ -z "$has_next" ]; then
              break
            fi

            page=$((page+1))
          done

          echo "Final job list: $jobs"

          cases=$(echo "$jobs" | jq -r '.[] | select(.name | contains("Case-")) | .name')
          echo "Extracted case names: $cases"

          passed=0
          failed=0
          failedlimit=100
          passedlimit=100
          failedlist=""
          passedlist=""
          lists=""

          emails="${{ needs.setup.outputs.email-receiver }}"
          echo "Initial email list: $emails"

          while IFS= read -r case;
          do
            if [ -z "$case" ]; then
              continue
            fi

            echo "Processing case: $case"
            name=$(echo "$case" | awk -F '|' '{print $1}')
            case_id=$(echo "$name" | awk -F '-' '{print $2}')
            os=$(echo "$case" | awk -F '|' '{print $2}')
            node=$(echo "$case" | awk -F '|' '{print $3}')
            branch=$(echo "$case" | awk -F '|' '{print $4}')

            title="Unknown Test Case Title"
            author="N/A"
            work_item_url="N/A"

            # Extract the title and author, and url from the corresponding agent_cases file
            case_file="./agent_cases/${case_id}.txt"
            echo "Looking for case file: $case_file"
            if [ -f "$case_file" ]; then
              echo "Found case file: $case_file"
              echo "whole file content:"
              cat "$case_file"
              # Get title
              title=$(grep -m1 '^#Title:' "$case_file" | sed 's/^#Title:[[:space:]]*//')
              echo "Extracted title: $title"


              # Get author
              author_line=$(grep -m1 '^#Author:' "$case_file" | sed 's/^#Author:[[:space:]]*//')
              if [ -n "$author_line" ]; then
              author="<a href=\\\"mailto:$author_line\\\"><span>$author_line</span></a>"
              fi
              echo "Extracted author: $author"

              # Get work item URL
              url_line=$(grep -m1 '^#URL:' "$case_file" | sed 's/^#URL:[[:space:]]*//')
              if [ -n "$url_line" ]; then
                work_item_url="<a href=\\\"$url_line\\\">Work Item</a>"
              fi
              echo "Extracted work item URL: $work_item_url"
            fi

            echo "Extracted info - Name: $name, OS: $os, Node: $node, Branch: $branch, Case ID: $case_id, Title: $title, Author: $author, Work Item URL: $work_item_url"

            # file=$(find src -name "$name.test.ts" 2>/dev/null)
            # echo "Test file found: $file"

            status=$(echo "$jobs" | jq --arg case "$case" -r '.[] | select(.name == $case ) | .conclusion')
            echo "Job status: $status"

            run_id=$(echo "$jobs" | jq --arg case "$case" -r '.[] | select(.name == $case ) | .run_id')
            echo "Run Id: $run_id"

            # Combine the case_id and run_id to create a lookup key
            lookup_key="${case_id}_${run_id}"

            echo "Lookup Key: $lookup_key"

            # Get the report URL from the JSON file using the lookup_key
            report_url=$(jq -r --arg key "$lookup_key" '.[$key]' "$report_map_json_file_path")
            if [ -z "$report_url" ] || [ "$report_url" = "null" ]; then
              report_url="N/A"
            else
              report_url="<a href=\\\"$report_url\\\">Report</a>"
            fi
            echo "Report URL: $report_url"

            if [[ -n "$email" && ! "$emails" == *"$email"* && "$status" == "failure" ]]; then
              emails="$emails;$email;"
            fi
            echo "Updated email list: $emails"

            started_at=$(echo "$jobs" | jq --arg case "$case" -r '.[] | select(.name == $case ) | .started_at')
            completed_at=$(echo "$jobs" | jq --arg case "$case" -r '.[] | select(.name == $case ) | .completed_at')
            echo "Start time: $started_at, Completed time: $completed_at"

            duration=$(dateutils.ddiff "$started_at" "$completed_at" -f "%Mm %Ss" 2>/dev/null)
            echo "Calculated duration: $duration"



            label=""
            if [ "$status" == "success" ]; then
              passed=$((passed+1))
              label="<span style=\\\"background-color:#2aa198;color:white;font-weight:bold;\\\">PASSED</span>"
            else
              failed=$((failed+1))
              label="<span style=\\\"background-color: #dc322f;color:white;font-weight:bold;\\\">FAILED</span>"
            fi
            echo "Job result label: $label"

            url=$(echo "$jobs" | jq --arg case "$case" -r '.[] | select(.name == $case ) | .html_url')
            url="<a href=\\\"$url\\\">$name</a>"
            echo "Job URL: $url"

            row="<tr> <td style=\\\"text-align: left;\\\">$url</td> <td style=\\\"text-align: left;\\\">$title</td> <td style=\\\"text-align: left;\\\">$os</td> <td style=\\\"text-align: left;\\\">$node</td> <td style=\\\"text-align: center;\\\">$label</td> <td style=\\\"text-align: center;\\\">$author</td> <td style=\\\"text-align: center;\\\">$work_item_url</td> <td style=\\\"text-align: center;\\\">$duration</td>  <td style=\\\"text-align: center;\\\">$report_url</td> </tr>"
            echo "Generated row: $row"

            if [[ "$status" == "success" && $passed -lt $passedlimit ]]; then
              passedlist="$passedlist $row"
            elif [[ "$status" != "success" && $failed -lt $failedlimit ]]; then
              failedlist="$failedlist $row"
            fi

          done <<< "$cases"

          lists="$failedlist $passedlist"
          echo "Final failed list: $failedlist"
          echo "Final passed list: $passedlist"

          body="<a href=\\\"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\\\">Test report link.</a>  <br/> Release: ${{ needs.setup.outputs.ttk-package }}. <br/> <table class=\\\"w3-table w3-striped w3-bordered\\\"> <tr> <th>CASE</th> <th>TITLE</th> <th>OS</th> <th>NODE</th> <th>STATUS</th> <th>AUTHOR</th><th>WORK ITEM</th> <th>DURATION</th> <th>Report URL</th> </tr> $lists </table> <br />"
          echo "Generated email body: $body"

          total=$((passed+failed))
          echo "Total jobs: $total, Passed: $passed, Failed: $failed"

          subject="Vsc Use UI Test Report ($passed/$total Passed)"
          if [ $failed -gt 0 ]; then
            subject="[FAILED] $subject"
          else
            subject="[PASSED] $subject"
          fi
          echo "Final subject: $subject"

          echo "body=$body" >> $GITHUB_OUTPUT
          echo "to=$emails" >> $GITHUB_OUTPUT
          echo "subject=$subject" >> $GITHUB_OUTPUT


      - name: Send E-mail
        uses: ./.github/actions/send-email-report
        env:
          TO: ${{ steps.list-jobs.outputs.to }}
          BODY: '"${{ steps.list-jobs.outputs.body }}"'
          SUBJECT: ${{ steps.list-jobs.outputs.subject }}
          MAIL_CLIENT_ID: ${{ secrets.TEST_CLEAN_CLIENT_ID }}
          MAIL_CLIENT_SECRET: ${{ secrets.TEST_CLEAN_CLIENT_SECRET }}
          MAIL_TENANT_ID: ${{ secrets.TEST_CLEAN_TENANT_ID }}