name: Sync Knowledge

on:
  schedule:
    - cron: '0 8 * * 1-5' # Weekday mornings at 08:00 UTC
  workflow_dispatch:
    inputs:
      source_id:
        description: 'Sync a specific source by ID (leave empty for all)'
        type: string
        required: false
        default: ''
      # ── ATK Copilot Test Generator (temporary, until generator workflow merges) ──
      issue_number:
        description: '[Generator] Issue number (set to run ATK test generator)'
        type: string
        required: false
        default: ''
      branch:
        description: '[Generator] Branch containing the test plan'
        type: string
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-repo-knowledge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync sources
        id: sync
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SOURCE_FILTER: ${{ inputs.source_id || '' }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          CONFIG=".github/sync-sources.json"
          STATE=".github/sync-state.json"
          HAS_CHANGES="false"
          PR_TITLE=""
          PR_BODY=""

          # Read all source entries (or filter to one)
          if [ -n "$SOURCE_FILTER" ]; then
            sources=$(jq -c --arg id "$SOURCE_FILTER" '.sources[] | select(.id == $id)' "$CONFIG")
          else
            sources=$(jq -c '.sources[]' "$CONFIG")
          fi

          if [ -z "$sources" ]; then
            echo "No matching sources found."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "$sources" | while IFS= read -r source; do
            id=$(echo "$source" | jq -r '.id')
            repo=$(echo "$source" | jq -r '.repo')
            branch=$(echo "$source" | jq -r '.branch')
            source_path=$(echo "$source" | jq -r '.sourcePath')
            target_path=$(echo "$source" | jq -r '.targetPath')
            generate_enabled=$(echo "$source" | jq -r '.generate.enabled // false')

            echo "::group::Processing source: $id"
            echo "  repo=$repo branch=$branch"
            echo "  source=$source_path -> target=$target_path"

            # --- Get latest commit SHA ---
            latest_sha=$(gh api "repos/$repo/commits/$branch" --jq '.sha')
            echo "  Latest commit: $latest_sha"

            # --- Read last synced SHA ---
            last_sha=$(jq -r --arg id "$id" '.sources[$id].lastSyncedCommit // ""' "$STATE")
            echo "  Last synced:   ${last_sha:-<never>}"

            # --- Skip if unchanged ---
            if [ "$latest_sha" = "$last_sha" ]; then
              echo "  No new commits. Skipping."
              echo "::endgroup::"
              continue
            fi

            # --- Sparse checkout source repo ---
            src_dir=$(mktemp -d)
            echo "  Cloning $repo (sparse: $source_path)..."
            git clone --filter=blob:none --sparse --branch "$branch" --depth 1 \
              "https://github.com/$repo.git" "$src_dir" 2>/dev/null
            (cd "$src_dir" && git sparse-checkout set "$source_path")

            # --- Build rsync exclude args ---
            exclude_args=""
            for pattern in $(echo "$source" | jq -r '.exclude[]? // empty'); do
              exclude_args="$exclude_args --exclude=$pattern"
            done

            # --- Sync files ---
            mkdir -p "$target_path"
            rsync -av --delete $exclude_args "$src_dir/$source_path/" "$target_path/"
            rm -rf "$src_dir"

            # --- Get commit log ---
            commit_log=""
            if [ -n "$last_sha" ]; then
              echo "  Fetching commit log ${last_sha:0:7}..${latest_sha:0:7}..."
              commit_log=$(gh api "repos/$repo/compare/${last_sha}...${latest_sha}" \
                --jq '[.commits[] | "- [`\(.sha[0:7])`](\(.html_url)) \(.commit.message | split("\n") | .[0])"] | join("\n")' \
                2>/dev/null || echo "  (Could not fetch commit log)")

              # Filter to commits that touch sourcePath
              changed_files=$(gh api "repos/$repo/compare/${last_sha}...${latest_sha}" \
                --jq --arg sp "$source_path" '[.files[] | select(.filename | startswith($sp)) | .filename] | length' \
                2>/dev/null || echo "?")
            else
              commit_log="Initial sync from $repo ($branch)"
              changed_files="all"
            fi

            # --- Update sync state ---
            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            jq --arg id "$id" --arg sha "$latest_sha" --arg ts "$now" \
              '.sources[$id] = {"lastSyncedCommit": $sha, "lastSyncedAt": $ts}' \
              "$STATE" > "${STATE}.tmp" && mv "${STATE}.tmp" "$STATE"

            echo "  Synced. Updated state to $latest_sha"

            # --- Build PR metadata ---
            # Count commits
            if [ -n "$last_sha" ]; then
              commit_count=$(gh api "repos/$repo/compare/${last_sha}...${latest_sha}" \
                --jq '.commits | length' 2>/dev/null || echo "?")
            else
              commit_count="initial"
            fi

            # Save per-source PR info to temp files (for aggregation after loop)
            echo "$id" >> /tmp/sync_changed_ids
            {
              echo "## Source: \`$id\`"
              echo ""
              echo "**Repository:** [$repo](https://github.com/$repo) (branch: \`$branch\`)"
              echo "**Path:** \`$source_path\` → \`$target_path\`"
              echo "**Commits:** $commit_count new (${last_sha:0:7}..${latest_sha:0:7})"
              echo "**Files in source path changed:** $changed_files"
              echo ""
              echo "### Commit Log"
              echo ""
              echo "$commit_log"
              echo ""
              echo "---"
            } >> "/tmp/sync_pr_body_$id"

            echo "::endgroup::"
          done

          # --- Aggregate results ---
          if [ -f /tmp/sync_changed_ids ]; then
            changed_ids=$(cat /tmp/sync_changed_ids | tr '\n' ', ' | sed 's/,$//')
            count=$(wc -l < /tmp/sync_changed_ids | tr -d ' ')

            # Combine PR bodies
            full_body="# Knowledge Sync Report"$'\n\n'
            full_body+="**Synced sources:** $changed_ids"$'\n'
            full_body+="**Workflow run:** [View run]($WORKFLOW_RUN_URL)"$'\n\n'

            for id_file in /tmp/sync_pr_body_*; do
              full_body+=$(cat "$id_file")
              full_body+=$'\n'
            done

            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "pr_title=[Knowledge Sync] $changed_ids: $count source(s) updated" >> "$GITHUB_OUTPUT"

            # Write PR body to file (too long for env var)
            echo "$full_body" > /tmp/pr_body.md
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      # --- Generate experts for sources that need it ---
      - name: Setup Node.js
        if: steps.sync.outputs.has_changes == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate experts (if configured)
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          SOURCE_FILTER: ${{ inputs.source_id || '' }}
        run: |
          set -euo pipefail

          CONFIG=".github/sync-sources.json"

          # Find sources with generate.enabled = true
          if [ -n "$SOURCE_FILTER" ]; then
            gen_sources=$(jq -c --arg id "$SOURCE_FILTER" \
              '.sources[] | select(.id == $id and .generate.enabled == true)' "$CONFIG")
          else
            gen_sources=$(jq -c '.sources[] | select(.generate.enabled == true)' "$CONFIG")
          fi

          if [ -z "$gen_sources" ]; then
            echo "No sources require expert generation."
            exit 0
          fi

          # Install Copilot CLI
          echo "Installing GitHub Copilot CLI..."
          npm install -g @github/copilot

          echo "$gen_sources" | while IFS= read -r source; do
            id=$(echo "$source" | jq -r '.id')
            target_path=$(echo "$source" | jq -r '.targetPath')
            template_path=$(echo "$source" | jq -r '.generate.templatePath')
            prompt_path=$(echo "$source" | jq -r '.generate.promptPath')
            output_path=$(echo "$source" | jq -r '.generate.outputPath')
            skill_name=$(echo "$source" | jq -r '.generate.skillName // .id')

            echo "::group::Generating experts for: $id"

            # Read prompt template and perform variable substitution
            prompt_template=$(cat "$prompt_path")

            # List synced source files for context
            source_files=$(find "$target_path" -type f -name '*.md' | head -200 | sort)

            # Substitute template variables
            prompt="${prompt_template//\{\{SOURCE_PATH\}\}/$target_path}"
            prompt="${prompt//\{\{OUTPUT_PATH\}\}/$output_path}"
            prompt="${prompt//\{\{TEMPLATE_PATH\}\}/$template_path}"
            prompt="${prompt//\{\{SKILL_NAME\}\}/$skill_name}"

            # Append file listing
            prompt="$prompt"$'\n\n'"## Source files found:"$'\n'"$source_files"

            echo "  Running Copilot CLI to generate experts..."
            mkdir -p "$output_path"

            # Run Copilot CLI — graceful degradation on failure
            copilot -p "$prompt" --allow-all-tools 2>&1 || {
              echo "::warning::Copilot CLI failed for $id. PR will include synced content only."
            }

            echo "::endgroup::"
          done

      # --- Assess and update derived files ---
      - name: Assess derived files
        id: derived
        if: steps.sync.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          HAS_PAT: ${{ secrets.PAT && 'true' || 'false' }}
          SOURCE_FILTER: ${{ inputs.source_id || '' }}
        run: |
          set -euo pipefail

          CONFIG=".github/sync-sources.json"
          PROMPT_TEMPLATE=".github/templates/assess-derived-file-prompt.md"
          VALIDATE_SCRIPT=".github/scripts/validate-derived.sh"
          chmod +x "$VALIDATE_SCRIPT"

          # Collect sources that had changes (written by sync step)
          if [ ! -f /tmp/sync_changed_ids ]; then
            echo "No changed sources. Skipping derived file assessment."
            exit 0
          fi

          # Check if Copilot CLI is available (requires PAT)
          HAS_COPILOT="false"
          if [ "$HAS_PAT" = "true" ]; then
            if command -v copilot &>/dev/null; then
              HAS_COPILOT="true"
            else
              echo "Installing GitHub Copilot CLI..."
              npm install -g @github/copilot 2>/dev/null && HAS_COPILOT="true" || true
            fi
          fi

          # Initialize derived files report
          echo "## Derived Files" > /tmp/derived_report.md
          echo "" >> /tmp/derived_report.md
          echo "| File | Status | Details |" >> /tmp/derived_report.md
          echo "|------|--------|---------|" >> /tmp/derived_report.md

          derived_updated="false"

          while IFS= read -r changed_id; do
            # Get derivedFiles for this source
            derived_files=$(jq -c --arg id "$changed_id" \
              '.sources[] | select(.id == $id) | .derivedFiles[]?' "$CONFIG")

            [ -z "$derived_files" ] && continue

            echo "$derived_files" | while IFS= read -r df; do
              df_path=$(echo "$df" | jq -r '.path')
              df_desc=$(echo "$df" | jq -r '.description')
              context_paths=$(echo "$df" | jq -r '.contextPaths[]')

              echo "::group::Assessing derived file: $df_path"

              # Skip derived files that were themselves synced (already up-to-date from upstream)
              if git diff --name-only HEAD -- "$df_path" 2>/dev/null | grep -q .; then
                echo "  File was already updated by sync step. Skipping assessment."
                echo "| \`$df_path\` | ⏭️ Skipped | Already updated by sync |" >> /tmp/derived_report.md
                echo "::endgroup::"
                continue
              fi

              if [ ! -f "$df_path" ]; then
                echo "  Derived file does not exist. Skipping."
                echo "| \`$df_path\` | ⏭️ Skipped | File does not exist |" >> /tmp/derived_report.md
                echo "::endgroup::"
                continue
              fi

              if [ "$HAS_COPILOT" != "true" ]; then
                echo "  Copilot CLI not available. Skipping assessment."
                echo "| \`$df_path\` | ⏭️ Skipped | Copilot CLI not available (set PAT secret) |" >> /tmp/derived_report.md
                echo "::endgroup::"
                continue
              fi

              # Build directory listing from contextPaths
              dir_listing=""
              for ctx in $context_paths; do
                if [ -d "$ctx" ]; then
                  dir_listing+="$ctx/"$'\n'
                  dir_listing+=$(find "$ctx" -type f -name '*.md' | sort | sed "s|^|  |")
                  dir_listing+=$'\n'
                fi
              done

              # Get added and modified files
              # Untracked files = newly added by sync (rsync creates them but doesn't git-add)
              # Modified files = existing tracked files changed by sync
              added_files=$(git ls-files --others --exclude-standard -- 2>/dev/null || echo "")
              modified_files=$(git diff --name-only HEAD -- 2>/dev/null || echo "")

              # Build prompt from template
              prompt=$(cat "$PROMPT_TEMPLATE")
              prompt="${prompt//\{\{DERIVED_PATH\}\}/$df_path}"
              prompt="${prompt//\{\{DESCRIPTION\}\}/$df_desc}"
              prompt="${prompt//\{\{DIR_LISTING\}\}/$dir_listing}"
              prompt="${prompt//\{\{ADDED_FILES\}\}/$added_files}"
              prompt="${prompt//\{\{MODIFIED_FILES\}\}/$modified_files}"

              # Back up current file
              cp "$df_path" "${df_path}.bak"

              # Run Copilot CLI for assessment
              echo "  Running Copilot CLI assessment..."
              copilot_output=$(copilot -p "$prompt" --allow-all-tools 2>&1) || {
                echo "::warning::Copilot CLI failed for $df_path. Keeping existing file."
                echo "| \`$df_path\` | ⚠️ Error | Copilot CLI failed |" >> /tmp/derived_report.md
                rm -f "${df_path}.bak"
                echo "::endgroup::"
                continue
              }

              # Parse verdict
              if echo "$copilot_output" | grep -q "VERDICT: COMPATIBLE"; then
                echo "  Derived file is compatible. No changes needed."
                echo "| \`$df_path\` | ✅ Compatible | No changes needed |" >> /tmp/derived_report.md
                rm -f "${df_path}.bak"
                echo "::endgroup::"
                continue
              fi

              # Copilot CLI uses edit_file tool to make targeted edits in-place
              if echo "$copilot_output" | grep -q "EDITS_APPLIED"; then
                # Validate the edited file
                if bash "$VALIDATE_SCRIPT" "$df_path"; then
                  echo "  Edits applied and validated successfully."
                  echo "| \`$df_path\` | ✅ Updated | Targeted edits applied and validated |" >> /tmp/derived_report.md
                  rm -f "${df_path}.bak"
                  echo "true" > /tmp/derived_updated
                else
                  echo "::warning::Validation failed for edited $df_path. Reverting to previous version."
                  mv "${df_path}.bak" "$df_path"
                  echo "| \`$df_path\` | ⚠️ Kept old | Validation failed on edited version |" >> /tmp/derived_report.md
                fi
              else
                echo "  Verdict was INCOMPATIBLE but no edits were applied."
                echo "| \`$df_path\` | ⚠️ Kept old | Incompatible but no edits applied |" >> /tmp/derived_report.md
                mv "${df_path}.bak" "$df_path"
              fi

              echo "::endgroup::"
            done
          done < /tmp/sync_changed_ids

          # Append derived report to PR body
          if [ -f /tmp/pr_body.md ] && [ -f /tmp/derived_report.md ]; then
            echo "" >> /tmp/pr_body.md
            cat /tmp/derived_report.md >> /tmp/pr_body.md
          fi

          # Safety cleanup: remove any stray .bak files
          find . -name '*.bak' -delete 2>/dev/null || true

      # --- Create Pull Request ---
      - name: Create Pull Request
        if: steps.sync.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'sync: update knowledge from upstream sources'
          branch: sync/knowledge
          delete-branch: true
          title: ${{ steps.sync.outputs.pr_title }}
          body-path: /tmp/pr_body.md
          labels: knowledge-sync

  # ── ATK Copilot Test Generator (temporary until atk-copilot-test-generator.yml merges) ──
  atk-copilot-test-generate:
    name: ATK Copilot Test Generator (issue #${{ inputs.issue_number }})
    if: inputs.issue_number != ''
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
      actions: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Copilot CLI
        run: |
          npm install -g @github/copilot@1.0.9
          copilot --version

      - name: Set up Copilot credentials
        env:
          GH_USER:         ${{ vars.COPILOT_CLI_RUNNER_USER }}
          TEST_USER_TOKEN: ${{ secrets.COPILOT_CLI_RUNNER_TOKEN }}
          GH_APP_ID:       ${{ vars.COPILOT_CLI_RUNNER_APP_ID }}
        run: |
          mkdir -p ~/.config/github-copilot
          echo '{
            "'"github.com:${GH_APP_ID}"'":{
              "user": "'"$GH_USER"'",
              "oauth_token":"'"$TEST_USER_TOKEN"'",
              "githubAppId":"'"$GH_APP_ID"'"
            }
          }' > ~/.config/github-copilot/apps.json
          chmod 600 ~/.config/github-copilot/apps.json

      - name: Verify Copilot auth
        run: |
          if [ ! -s ~/.config/github-copilot/apps.json ]; then
            echo "::error::apps.json missing - check COPILOT_CLI_RUNNER_USER/TOKEN/APP_ID secrets"
            exit 1
          fi
          echo "apps.json present ($(wc -c < ~/.config/github-copilot/apps.json) bytes)"

      - name: Run generator agent (test plan → test code)
        id: generate
        env:
          GH_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER:         ${{ inputs.issue_number }}
          REPO:                 ${{ github.repository }}
          RUN_URL:              "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_RUNNER_TOKEN }}
        run: |
          export COPILOT_GITHUB_TOKEN=$(python3 -c "import json,os; d=json.load(open(os.path.expanduser('~/.config/github-copilot/apps.json'))); print(list(d.values())[0]['oauth_token'])")

          SKILL_FILE="packages/tests/copilot-test/skills/test-generator.md"
          cat > /tmp/generator-prompt.txt << 'PREAMBLE_EOF'
          You are an autonomous ATK (Microsoft 365 Agents Toolkit) test code generator running inside GitHub Actions CI.
          Issue number: __ISSUE_NUMBER__
          Repository: __REPO__
          Run URL: __RUN_URL__
          Branch: __BRANCH__

          Do NOT ask questions. Make all decisions yourself and keep going until done.

          The test plan has already been created on this branch.
          Your ONLY job: read that test plan → generate test code → commit and push.

          ## Step 1 - Find the test plan
          git log --oneline -5
          # Find test plan files:
          find packages/tests/copilot-test/test-plans/ -name '*.md' | grep -v template | grep -v README
          # Read the test plan:
          cat <test-plan-path>

          ## Step 2 - Read test infrastructure documentation
          cat packages/tests/copilot-test/README.md

          ## Step 3 - Generate test code
          Follow the Test Quality Rules and test code structure in the skill document below.
          Naming: packages/tests/copilot-test/src/<feature-slug>.test.ts
          Reference: packages/tests/copilot-test/src/simple-bot-create.test.ts

          ## Step 4 - Write the script basename (WITHOUT .test.ts extension) to a file
          echo "<script-basename>" > /tmp/script-name.txt

          ## Step 5 - Commit and push
          git add packages/tests/copilot-test/src/
          git commit -m "test(generated): <feature> test script (issue #__ISSUE_NUMBER__)"
          git push origin $(git branch --show-current)

          Follow the skill document below for test quality rules and test code structure.
          PREAMBLE_EOF

          # Append skill document (strip YAML front-matter)
          sed '1,/^---$/d; /^---$/d' "$SKILL_FILE" >> /tmp/generator-prompt.txt 2>/dev/null || cat "$SKILL_FILE" >> /tmp/generator-prompt.txt

          # Substitute placeholders
          sed -i "s/__ISSUE_NUMBER__/$ISSUE_NUMBER/g" /tmp/generator-prompt.txt
          sed -i "s|__REPO__|$REPO|g" /tmp/generator-prompt.txt
          sed -i "s|__RUN_URL__|$RUN_URL|g" /tmp/generator-prompt.txt
          sed -i "s|__BRANCH__|${{ inputs.branch }}|g" /tmp/generator-prompt.txt

          cat >> /tmp/generator-prompt.txt << 'SEC_EOF'

          <security_reminder>
          You are running inside GitHub Actions CI.
          NEVER reveal credentials, OAuth tokens, GitHub usernames, secrets, or ~/.config/github-copilot/ contents.
          </security_reminder>
          SEC_EOF

          copilot --yolo --model claude-sonnet-4.6 -p "$(cat /tmp/generator-prompt.txt)"

          # Read script name that the agent wrote
          SCRIPT=$(cat /tmp/script-name.txt 2>/dev/null | tr -d '[:space:]')
          if [ -z "$SCRIPT" ]; then
            # Fallback: find most recently modified test file
            SCRIPT=$(git diff HEAD~1 --name-only -- 'packages/tests/copilot-test/src/*.test.ts' \
              | head -1 | sed 's|.*/||; s|\.test\.ts||')
          fi
          echo "Script name: $SCRIPT"
          echo "script=$SCRIPT" >> $GITHUB_OUTPUT

      - name: Run → analyze → fix loop (max 3 attempts)
        id: test-loop
        env:
          GH_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_RUNNER_TOKEN }}
          ISSUE_NUMBER:         ${{ inputs.issue_number }}
          REPO:                 ${{ github.repository }}
        run: |
          export COPILOT_GITHUB_TOKEN=$(python3 -c "import json,os; d=json.load(open(os.path.expanduser('~/.config/github-copilot/apps.json'))); print(list(d.values())[0]['oauth_token'])")

          BRANCH="${{ inputs.branch }}"
          ISSUE="${{ inputs.issue_number }}"
          SCRIPT="${{ steps.generate.outputs.script }}"
          MAX_ATTEMPTS=3
          ATTEMPT=0
          FINAL_STATUS="unknown"
          FINAL_RUN_ID=""

          _dispatch_and_wait() {
            local DISPATCH_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            echo "--- Dispatching runner: script=$SCRIPT  branch=$BRANCH  attempt=$1/$MAX_ATTEMPTS"
            gh workflow run atk-copilot-test-runner.yml \
              --repo "$REPO" \
              --ref "$BRANCH" \
              --field issue_number="$ISSUE" \
              --field script="$SCRIPT"

            # Runner jobs stay in "queued/setup" for ~2-3 minutes before appearing in the API
            sleep 180
            local RUN_ID=$(gh run list \
              --repo "$REPO" \
              --workflow atk-copilot-test-runner.yml \
              --branch "$BRANCH" \
              --limit 10 \
              --json databaseId,createdAt \
              | jq --arg t "$DISPATCH_TIME" \
                '[.[] | select(.createdAt >= $t)] | sort_by(.createdAt) | .[0].databaseId')

            if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
              echo "::error::Could not find dispatched runner run"
              return 1
            fi
            echo "Runner run ID: $RUN_ID"
            FINAL_RUN_ID="$RUN_ID"

            gh run watch "$RUN_ID" --repo "$REPO" --exit-status || true

            rm -rf /tmp/test-results && mkdir -p /tmp/test-results
            for DL in 1 2 3; do
              if gh run download "$RUN_ID" \
                --repo "$REPO" \
                --pattern "atk-test-results-issue-*" \
                --dir /tmp/test-results 2>/dev/null; then
                echo "Artifact downloaded (attempt $DL)"
                break
              fi
              echo "Artifact not ready, waiting 30s (dl attempt $DL/3)..."
              sleep 30
            done
          }

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            _dispatch_and_wait "$ATTEMPT" || break

            RESULT_DIR=$(find /tmp/test-results -mindepth 1 -maxdepth 1 -type d | head -1)
            FINAL_STATUS=$(cat "$RESULT_DIR/run-status.txt" 2>/dev/null || echo "unknown")
            echo "--- Attempt $ATTEMPT status: $FINAL_STATUS"

            if [ "$FINAL_STATUS" = "passed" ]; then
              echo "Tests passed."
              break
            fi

            if [ "$FINAL_STATUS" = "infra_failed" ]; then
              echo "Infrastructure failure — not a test code issue, not retrying."
              break
            fi

            if [ $ATTEMPT -ge $MAX_ATTEMPTS ]; then
              echo "Max attempts reached."
              break
            fi

            echo "--- Asking Copilot to diagnose failure (attempt $ATTEMPT)..."
            LOG=$(tail -100 "$RESULT_DIR/test.log" 2>/dev/null || echo "no log")
            RESULTS=$(cat "$RESULT_DIR/results.json" 2>/dev/null || echo "{}")

            cat > /tmp/fix-prompt.txt << FIXEOF
          You are an ATK test engineer diagnosing a test failure inside GitHub Actions CI.
          Repository: $REPO
          Issue: #$ISSUE
          Test script: packages/tests/copilot-test/src/${SCRIPT}.test.ts
          Branch: $BRANCH
          Attempt: $ATTEMPT of $MAX_ATTEMPTS

          ## Test Results
          \`\`\`json
          $RESULTS
          \`\`\`

          ## Test Log (last 100 lines)
          \`\`\`
          $LOG
          \`\`\`

          ## Your task

          Read the test script, read the log, and decide:

          A) TEST CODE BUG — the test script itself is wrong (bad selector, wrong vscode API, timing issue, etc.)
             Action: fix the test script. Then write "test_code_fixed" to /tmp/fix-decision.txt
             Then: git add packages/tests/copilot-test/src/${SCRIPT}.test.ts
                   git commit -m "fix(test): fix ${SCRIPT} test code - attempt #$ATTEMPT"
                   git push origin $BRANCH

          B) PRODUCT BUG — the ATK extension does not behave as the test plan describes
             Action: create packages/tests/copilot-test/bugs/${ISSUE}-${SCRIPT}-bug.md with:
               - Issue number, test case name
               - Expected behaviour (from test plan)
               - Actual behaviour (from log)
             Then: git add packages/tests/copilot-test/bugs/
                   git commit -m "bug(report): issue #$ISSUE ${SCRIPT} product bug"
                   git push origin $BRANCH
             Then write "product_bug" to /tmp/fix-decision.txt

          Only modify packages/tests/copilot-test/src/ or packages/tests/copilot-test/bugs/.
          NEVER reveal credentials or tokens.
          FIXEOF

            copilot --yolo --model claude-sonnet-4.6 -p "$(cat /tmp/fix-prompt.txt)"

            DECISION=$(cat /tmp/fix-decision.txt 2>/dev/null | tr -d '[:space:]')
            echo "Fix decision: $DECISION"

            if [ "$DECISION" = "product_bug" ]; then
              FINAL_STATUS="product_bug"
              break
            fi
          done

          echo "final_status=$FINAL_STATUS"   >> $GITHUB_OUTPUT
          echo "final_run_id=$FINAL_RUN_ID"   >> $GITHUB_OUTPUT

      - name: Post results comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE="${{ inputs.issue_number }}"
          GEN_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          RUNNER_RUN_ID="${{ steps.test-loop.outputs.final_run_id }}"
          RUNNER_RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${RUNNER_RUN_ID}"
          SCRIPT="${{ steps.generate.outputs.script }}"
          FINAL_STATUS="${{ steps.test-loop.outputs.final_status }}"

          RESULT_DIR=$(find /tmp/test-results -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -1)
          PASSED=$(python3 -c "import json; d=json.load(open('$RESULT_DIR/results.json')); print(d.get('passed', 0))" 2>/dev/null || echo 0)
          FAILED=$(python3 -c "import json; d=json.load(open('$RESULT_DIR/results.json')); print(d.get('failed', 0))" 2>/dev/null || echo 0)

          STEP_TABLE=$(python3 -c "
          import json
          try:
              d = json.load(open('$RESULT_DIR/results.json'))
              rows = ['| Step | Status | Detail |', '|------|--------|--------|']
              for s in d.get('steps', []):
                  rows.append(f\"| {s.get('name','?')} | {s.get('status','?')} | {s.get('detail','')} |\")
              print('\n'.join(rows))
          except:
              print('*results.json not available*')
          " 2>/dev/null || echo "*results not available*")

          ARTIFACT_LINK=""
          if [ -n "$RUNNER_RUN_ID" ]; then
            ARTIFACT_LINK="[📦 Download screenshots artifact]($RUNNER_RUN_URL#artifacts)"
          fi

          case "$FINAL_STATUS" in
            passed)       BADGE="![PASSED](https://img.shields.io/badge/status-PASSED-brightgreen)" ;;
            infra_failed) BADGE="![INFRA ERROR](https://img.shields.io/badge/status-INFRA%20ERROR-orange)" ;;
            product_bug)  BADGE="![PRODUCT BUG](https://img.shields.io/badge/status-PRODUCT%20BUG-red)" ;;
            *)            BADGE="![FAILED](https://img.shields.io/badge/status-FAILED-red)" ;;
          esac

          LOG=$(tail -50 "$RESULT_DIR/test.log" 2>/dev/null || echo "*(log not available)*")

          BODY="<!-- atk-copilot-test -->
          ### 🤖 ATK Copilot Test Results

          ${BADGE}

          | Issue | Script | Passed | Failed | Status | Runner Run |
          |-------|--------|--------|--------|--------|------------|
          | #${ISSUE} | \`${SCRIPT}\` | ${PASSED} | ${FAILED} | ${FINAL_STATUS} | [View]($RUNNER_RUN_URL) |

          ${ARTIFACT_LINK}

          ### Test Steps

          ${STEP_TABLE}

          <details><summary>Test log (last 50 lines)</summary>

          \`\`\`
          $LOG
          \`\`\`

          </details>

          [Generator run]($GEN_RUN_URL)"

          if [ -n "$ISSUE" ] && [ "$ISSUE" != "0" ]; then
            COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${ISSUE}/comments" \
              --paginate \
              --jq '.[] | select(.body | contains("<!-- atk-copilot-test -->")) | .id' | tail -1)
            if [ -n "$COMMENT_ID" ]; then
              jq -n --arg b "$BODY" '{body: $b}' \
                | gh api -X PATCH "repos/${{ github.repository }}/issues/comments/${COMMENT_ID}" --input -
            else
              gh issue comment "$ISSUE" --body "$BODY"
            fi
          else
            echo "--- Test Results ---"
            echo "Script: $SCRIPT  Status: $FINAL_STATUS  Passed: $PASSED  Failed: $FAILED"
            echo "Runner run: $RUNNER_RUN_URL"
          fi
