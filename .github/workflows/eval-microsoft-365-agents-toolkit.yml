name: Evaluate Microsoft 365 Agents Toolkit Skill

on:
  workflow_dispatch:
  push:
    paths:
      - 'packages/vscode-extension/skills/microsoft-365-agents-toolkit/**'
      - 'evals/microsoft-365-agents-toolkit/**'
      - '.github/workflows/eval-microsoft-365-agents-toolkit.yml'

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install GitHub Copilot CLI
        run: |
          npm install -g @github/copilot
          copilot --version

      - name: Install Waza
        run: go install github.com/microsoft/waza/cmd/waza@latest

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Run evaluation
        env:
          M365_ACCOUNT_NAME: ${{ secrets.M365_ACCOUNT_NAME }}
          M365_ACCOUNT_PASSWORD: ${{ secrets.M365_ACCOUNT_PASSWORD }}
          M365_TENANT_ID: ${{ secrets.M365_TENANT_ID }}
          AZURE_ACCOUNT_NAME: ${{ secrets.AZURE_ACCOUNT_NAME }}
          AZURE_ACCOUNT_OBJECT_ID: ${{ secrets.AZURE_ACCOUNT_OBJECT_ID }}
          AZURE_ACCOUNT_PASSWORD: ${{ secrets.AZURE_ACCOUNT_PASSWORD }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: waza run --output-dir ./results

      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-eval-results
          path: ./results
          retention-days: 30
