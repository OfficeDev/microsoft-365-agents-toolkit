name: Evaluate Microsoft 365 Agents Toolkit Skill

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - 'packages/vscode-extension/skills/microsoft-365-agents-toolkit/**'
      - 'evals/microsoft-365-agents-toolkit/**'
      - '.github/workflows/eval-microsoft-365-agents-toolkit.yml'
  pull_request:
    paths:
      - 'packages/vscode-extension/skills/microsoft-365-agents-toolkit/**'
      - 'evals/microsoft-365-agents-toolkit/**'
      - '.github/workflows/eval-microsoft-365-agents-toolkit.yml'

permissions:
  contents: read
  pull-requests: write

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install GitHub Copilot CLI
        run: |
          npm install -g @github/copilot
          copilot --version

      - name: Install Waza
        run: curl -fsSL https://raw.githubusercontent.com/microsoft/waza/main/install.sh | bash

      - name: Run evaluation
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          M365_ACCOUNT_NAME: ${{ vars.TEST_ACCOUNT_NAME }}
          M365_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
          M365_TENANT_ID: ${{ vars.TEST_TENANT_CLEAN_TENANT_ID }}
          AZURE_ACCOUNT_NAME: ${{ vars.TEST_ACCOUNT_NAME }}
          AZURE_ACCOUNT_OBJECT_ID: ${{ vars.TEST_ACCOUNT_OBJECT_ID }}
          AZURE_ACCOUNT_PASSWORD: ${{ secrets.TEST_ACCOUNT_PASSWORD }}
          AZURE_TENANT_ID: ${{ vars.TEST_TENANT_CLEAN_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: waza run -o evals/results/latest.json

      - name: Compare with baseline
        if: always()
        run: |
          if [ -f evals/results/baseline.json ] && [ -f evals/results/latest.json ]; then
            set +e
            waza compare evals/results/baseline.json evals/results/latest.json -f json > evals/results/compare.json 2> evals/results/compare.stderr
            compare_exit_code=$?
            set -e

            COMPARE_EXIT_CODE=$compare_exit_code node <<'NODE'
            const fs = require("fs");

            const jsonPath = "evals/results/compare.json";
            const stderrPath = "evals/results/compare.stderr";
            const mdPath = "evals/results/compare.md";
            const compareExitCode = Number(process.env.COMPARE_EXIT_CODE || "0");

            const escapeCell = (value) =>
              String(value)
                .replace(/\|/g, "\\|")
                .replace(/\r?\n/g, " ")
                .trim();

            const isPrimitive = (value) =>
              value === null || ["string", "number", "boolean"].includes(typeof value);

            const kvTable = (title, obj) => {
              if (!obj || typeof obj !== "object" || Array.isArray(obj)) return "";
              const entries = Object.entries(obj).filter(([, value]) => isPrimitive(value));
              if (entries.length === 0) return "";
              const rows = entries
                .map(([key, value]) => `| ${escapeCell(key)} | ${escapeCell(value)} |`)
                .join("\n");
              return `### ${title}\n\n| Metric | Value |\n| --- | --- |\n${rows}\n`;
            };

            const arrayTable = (title, arr) => {
              if (!Array.isArray(arr) || arr.length === 0) return "";

              const objectRows = arr.filter((item) => item && typeof item === "object" && !Array.isArray(item));
              if (objectRows.length === 0) {
                const rows = arr
                  .slice(0, 20)
                  .map((item, index) => `| ${index} | ${escapeCell(JSON.stringify(item))} |`)
                  .join("\n");
                return `### ${title}\n\n| Index | Value |\n| --- | --- |\n${rows}\n`;
              }

              const columnSet = new Set();
              objectRows.forEach((row) => {
                Object.entries(row).forEach(([key, value]) => {
                  if (isPrimitive(value)) {
                    columnSet.add(key);
                  }
                });
              });

              let columns = Array.from(columnSet);
              if (columns.length === 0) {
                const rows = objectRows
                  .slice(0, 20)
                  .map((item, index) => `| ${index} | ${escapeCell(JSON.stringify(item))} |`)
                  .join("\n");
                return `### ${title}\n\n| Index | Value |\n| --- | --- |\n${rows}\n`;
              }

              columns = columns.slice(0, 8);
              const header = `| ${columns.map(escapeCell).join(" | ")} |`;
              const separator = `| ${columns.map(() => "---").join(" | ")} |`;
              const rows = objectRows
                .slice(0, 50)
                .map((row) => `| ${columns.map((column) => escapeCell(row[column] ?? "")).join(" | ")} |`)
                .join("\n");

              return `### ${title}\n\n${header}\n${separator}\n${rows}\n`;
            };

            let md = "## Waza Comparison Report\n\n";
            let parsed;
            let parseError = "";

            if (fs.existsSync(jsonPath)) {
              try {
                parsed = JSON.parse(fs.readFileSync(jsonPath, "utf8"));
              } catch (error) {
                parseError = error instanceof Error ? error.message : String(error);
              }
            }

            if (parsed !== undefined) {
              if (Array.isArray(parsed)) {
                md += arrayTable("Comparison", parsed) || "No comparable rows were found in compare output.\n";
              } else if (parsed && typeof parsed === "object") {
                const sections = [];
                sections.push(kvTable("Summary", parsed.summary && typeof parsed.summary === "object" ? parsed.summary : parsed));

                const preferredArrayKeys = ["models", "results", "comparisons", "items", "tasks", "scores", "rows", "data"];
                const seen = new Set();

                preferredArrayKeys.forEach((key) => {
                  if (Array.isArray(parsed[key])) {
                    sections.push(arrayTable(key, parsed[key]));
                    seen.add(key);
                  }
                });

                Object.entries(parsed).forEach(([key, value]) => {
                  if (!seen.has(key) && Array.isArray(value)) {
                    sections.push(arrayTable(key, value));
                  }
                });

                md += sections.filter(Boolean).join("\n");
                if (!sections.some(Boolean)) {
                  md += "No tabular data found in compare output.\n";
                }
              } else {
                md += "Compare JSON output is not an object or array.\n";
              }
            } else {
              md += "Failed to parse compare JSON output.\n";
              if (parseError) {
                md += `\nParse error: ${parseError}\n`;
              }
            }

            if (compareExitCode !== 0) {
              md += `\nComparison command exited with code ${compareExitCode}.\n`;
            }

            if (fs.existsSync(stderrPath)) {
              const stderr = fs.readFileSync(stderrPath, "utf8").trim();
              if (stderr) {
                md += "\n### Command Stderr\n\n";
                md += "```text\n";
                md += stderr.slice(0, 20000);
                md += "\n```\n";
              }
            }

            fs.writeFileSync(mdPath, md, "utf8");
            NODE
          else
            {
              echo "## Waza Comparison Report"
              echo
              echo "Comparison skipped because baseline or latest result file was not found."
              echo
              echo "- baseline: evals/results/baseline.json"
              echo "- latest: evals/results/latest.json"
            } > evals/results/compare.md
          fi

      - name: Generate comparison Markdown
        if: always()
        run: node evals/results/generate-compare-markdown.js

      - name: Post comparison comment on PR
        if: always() && github.event_name == 'pull_request'
        run: |
          node -e "const fs = require('fs'); const { context, github } = require('@actions/github'); const marker = '<!-- waza-compare-report -->'; const reportPath = 'evals/results/compare.md'; let report = 'Comparison report was not generated.'; if (fs.existsSync(reportPath)) { report = fs.readFileSync(reportPath, 'utf8'); } if (report.length > 60000) { report = `${report.slice(0, 60000)}\n\n... report truncated ...`; } const body = [ marker, '## Waza Compare Result', '', 'Baseline: `evals/results/baseline.json`', 'Latest: `evals/results/latest.json`', '', report, ].join('\n'); const { owner, repo } = context.repo; const issue_number = context.payload.pull_request.number; (async () => { const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100, }); const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker)); if (existing) { await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body, }); } else { await github.rest.issues.createComment({ owner, repo, issue_number, body, }); } })();"
      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-eval-results
          path: |
            ./evals/results/latest.json
            ./evals/results/compare.json
            ./evals/results/compare-dashboard.html
          retention-days: 30
