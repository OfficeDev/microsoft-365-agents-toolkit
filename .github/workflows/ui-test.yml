name: uitest

on:
  schedule:
    - cron: '0 4 * * *'  # Daily execution at 4:00 AM UTC
  workflow_dispatch:      # Manual trigger support

jobs:
  find_files:
    runs-on: windows-latest
    outputs:
      files_list: ${{ steps.set_output.outputs.files_list }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate file list
        shell: pwsh
        run: |
          # Recursively find all .txt files in target directory
          $files = Get-ChildItem -Path "packages/vscode-ui/vscuse/cases" -Filter *.txt -Recurse | % FullName

          # Debugging: Print the files found
          Write-Host "Found files:"
          $files | ForEach-Object { Write-Host $_ }

          # Filter out any empty or invalid file entries
          $validFiles = $files | Where-Object { $_ -ne $null -and $_ -ne "" }

          # Debugging: Print valid files list
          Write-Host "Valid files:"
          $validFiles | ForEach-Object { Write-Host $_ }

          # Export valid files as JSON array
          $validFiles | ConvertTo-Json -Compress | Out-File -Encoding utf8 files_list.json

      - name: Set output variable
        id: set_output
        shell: pwsh
        run: |
          # Prepare output for matrix strategy
          $json = Get-Content -Raw files_list.json
          
          # Debugging: Check the generated list
          Write-Host "Generated file list: $json"

          # Clean up file list to ensure proper formatting (remove extra commas)
          $formattedList = ($json -replace '[\r\n]', ',').Trim()

          # Debugging: Check formatted list
          Write-Host "Formatted file list: $formattedList"

          echo "files_list=$formattedList" >> $env:GITHUB_OUTPUT

  process_file:
    needs: find_files
    runs-on: windows-latest
    strategy:
      matrix:
        file: ${{ fromJson(needs.find_files.outputs.files_list) }}
      max-parallel: 1      # Limit concurrent executions
      fail-fast: false     # Continue on individual failures

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Process ${{ matrix.file }}
        shell: pwsh
        run: |
          # Initialize required assemblies
          Add-Type -AssemblyName System.Web
          $file = "${{ matrix.file }}"

          # --- File Upload Phase ---
          $uploadResponse = curl -s -X PUT "https://8mf6h13h-8989.asse.devtunnels.ms/file" `
            -F "file=@$file" `
            -D headers.txt `
            -o response.json         # Save response body

          # Validate upload status
          $statusCode = (Get-Content headers.txt | Select-String 'HTTP/\d\.\d (\d+)').Matches.Groups[1].Value
          if ($statusCode -ne "200") {
            Write-Host "##[error]Upload Failed (Code $statusCode)"
            exit 1
          }

          # Extract task ID from response
          try {
            $task_id = (Get-Content response.json | ConvertFrom-Json).task_id
          } catch {
            Write-Host "##[error]Invalid Response Format"
            exit 1
          }

          # --- Task Monitoring Phase ---
          $timeout = New-TimeSpan -Minutes 10
          $stopwatch = [Diagnostics.Stopwatch]::StartNew()

          while ($stopwatch.Elapsed -lt $timeout) {
            # Poll task status endpoint
            $taskStatus = curl -s -X GET "https://8mf6h13h-8989.asse.devtunnels.ms/file/$task_id"

            if ($taskStatus.StatusCode -eq 202) {
              # Task still processing
              Write-Host "[$(Get-Date)] Task processing..."
              Start-Sleep -Seconds 15
            }
            elseif ($taskStatus.StatusCode -eq 200) {
              # Successful completion check
              if ($taskStatus.Content -match '\.html') {
                Write-Host "##[info]Success: HTML generated"
                break
              } else {
                Write-Host "##[warning]Missing HTML output"
                exit 0
              }
            }
            else {
              # Handle unexpected status codes
              Write-Host "##[error]Unexpected Status: $($taskStatus.StatusCode)"
              exit 1
            }
          }

          # --- Timeout Handling ---
          if ($stopwatch.Elapsed -ge $timeout) {
            Write-Host "##[error]Task timed out after 10 minutes"
            exit 1
          }
