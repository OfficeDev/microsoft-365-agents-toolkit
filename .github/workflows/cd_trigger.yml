name: TeamsFx-CD Triggers

on:
  workflow_run:
    workflows: ["CD"]
    branches: ["dev", "release/**"]
    types: ["completed"]

jobs:
  TeamsFxCICDTestMainTriggers:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && startsWith(github.event.workflow_run.head_branch, 'release') }}
    steps:
      - name: Trigger TeamsFx-CICD-Test
        run: |
          curl \
              -u :${{ secrets.GHEC_BOT_PAT }} \
              -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/devdiv-azure-service-dmitryr/TeamsFx-CICD-Test/actions/workflows/trigger_cicd_by_main.yml/dispatches \
              -d "{\"ref\":\"main\"}"

  TeamsFxCICDTestDevTriggers:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}
    steps:
      - name: Trigger TeamsFx-CICD-Test
        run: |
          curl \
              -u :${{ secrets.GHEC_BOT_PAT }} \
              -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              https://api.github.com/repos/devdiv-azure-service-dmitryr/TeamsFx-CICD-Test/actions/workflows/trigger_cicd_by_dev.yml/dispatches \
              -d "{\"ref\":\"main\"}"

  cherry-pick-version-change:
    if: ${{ contains(github.event.workflow_run.display_title, 'stable') &&
      github.event.workflow_run.conclusion == 'success'}}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Get workflow information
        id: workflow-info
        uses: actions/github-script@v6
        with:
          script: |
            const workflow_run = await github.rest.actions.getWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.payload.workflow_run.id
            });
            return {
              actor: workflow_run.data.actor.login,
              branch: workflow_run.data.head_branch
            }

      - name: Create Version Change Issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const actor = '${{ steps.workflow-info.outputs.result }}'.actor;
            const sourceBranch = '${{ steps.workflow-info.outputs.result }}'.branch;
            
            const issueBody = `
            ### Version Change Cherry-pick Reminder
            
            @${actor} Hello!
            
            This is an automatically created reminder for version change cherry-pick.
            The stable version has been released from branch \`${sourceBranch}\`.
            
            Please cherry-pick the version change commit to the following branch:
            - [ ] cherry-pick version change to \`dev\` branch
            
            #### Steps to Follow:
            1. Find the version change commit from branch \`${sourceBranch}\`
            2. Execute the following commands:
               \`\`\`bash
               git fetch origin
               git checkout dev
               git cherry-pick <version_change_commit_hash>
               git push origin dev
               \`\`\`
            
            After completion, please check the item above ✓
            
            > Note: This is an automatically created issue. You can close this issue after completing the operation.
            `;
            
            try {
              const issue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `[Version Change] Cherry-pick version changes from ${sourceBranch} to dev branch`,
                body: issueBody,
                labels: ['cherry-pick-required'],
                assignees: [actor]
              });
              
              console.log(`Created issue #${issue.data.number}`);
            } catch (error) {
              console.log('Error creating issue:', error);
              core.setFailed(error.message);
            }
