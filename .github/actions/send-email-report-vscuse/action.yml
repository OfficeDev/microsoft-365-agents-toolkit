name: Send Email Report
description: Send Email Report
inputs:
  to:
    description: 'Email recipients'
    required: true
  subject:
    description: 'Email subject'
    required: true
  body:
    description: 'Email body content'
    required: true
  mail_client_id:
    description: 'Mail client ID'
    required: true
  mail_client_secret:
    description: 'Mail client secret'
    required: true
  mail_tenant_id:
    description: 'Mail tenant ID'
    required: true
runs:
  using: "composite"
  steps:
    - name: Write body to file
      shell: bash
      run: |
        # Write body to file first to avoid argument list too long error
        cat > "$RUNNER_TEMP/email_body.txt" << 'EOFBODY'
        ${{ inputs.body }}
        EOFBODY

    - name: Send email
      shell: bash
      env:
        MAIL_TO: ${{ inputs.to }}
        MAIL_SUBJECT: ${{ inputs.subject }}
        MAIL_CLIENT_ID: ${{ inputs.mail_client_id }}
        MAIL_CLIENT_SECRET: ${{ inputs.mail_client_secret }}
        MAIL_TENANT_ID: ${{ inputs.mail_tenant_id }}
      run: |
        # Get access token
        response=$(curl -s \
          --request POST \
          --header "Content-Type: application/x-www-form-urlencoded" \
          --data "grant_type=client_credentials&client_id=${MAIL_CLIENT_ID}&client_secret=${MAIL_CLIENT_SECRET}&resource=https://management.core.windows.net" \
          "https://login.microsoftonline.com/${MAIL_TENANT_ID}/oauth2/token")

        access_token=$(echo "$response" | jq -r '. | select(.access_token) | .access_token')

        if [ -z "$access_token" ] || [ "$access_token" == "null" ]; then
          echo "Failed to get access token"
          exit 1
        fi

        # Build JSON payload using jq to properly escape and handle large content
        payload=$(jq -n \
          --arg to "$MAIL_TO" \
          --arg subject "$MAIL_SUBJECT" \
          --rawfile body "$RUNNER_TEMP/email_body.txt" \
          '{to: $to, body: $body, subject: $subject}')

        # Send email
        curl -s \
          --request POST \
          --header "Content-Type: application/json" \
          --header "Authorization: Bearer $access_token" \
          --data "$payload" \
          'https://prod-18.northcentralus.logic.azure.com:443/workflows/b33d7861bfc64832a6f62cc8f2213988/triggers/manual/paths/invoke?api-version=2016-10-01&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0'

        # Clean up
        rm -f "$RUNNER_TEMP/email_body.txt"
